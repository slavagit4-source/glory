<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLORY | Мессенджер с подарками</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-primary);
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111;
            --bg-tertiary: #0c0c0c;
            --bg-card: #1a1a1a;
            --bg-input: #1a1a1a;
            --border-color: #222;
            --text-primary: #fff;
            --text-secondary: #888;
            --text-muted: #666;
            --accent-color: #7c4dff;
            --message-out: #7c4dff;
            --message-in: #1a1a1a;
            --success: #4caf50;
            --danger: #ff5e5e;
            --warning: #ff9800;
            --gift-gold: #ffd700;
        }
        
        body.light-theme {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f0f0f0;
            --bg-card: #ffffff;
            --bg-input: #f5f5f5;
            --border-color: #e0e0e0;
            --text-primary: #1a1a1a;
            --text-secondary: #666;
            --message-in: #e9ecef;
        }

        .app {
            display: flex;
            height: 100vh;
            width: 100%;
            background: var(--bg-primary);
            overflow: hidden;
        }

        .menu-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: transform 0.3s ease;
            overflow-y: auto;
        }
        
        .menu-screen.hide {
            transform: translateX(-100%);
        }
        
        .menu-card {
            background: var(--bg-secondary);
            border-radius: 48px;
            padding: 40px;
            width: 85%;
            max-width: 350px;
            text-align: center;
            margin: 20px 0;
        }
        
        .cake-3d-container {
            width: 220px;
            height: 220px;
            margin: 0 auto 20px;
            cursor: pointer;
        }
        
        .menu-btn {
            padding: 16px;
            border-radius: 40px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            background: var(--accent-color);
            color: white;
            width: 100%;
            margin-bottom: 12px;
        }
        
        .menu-btn.secondary {
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        
        .gift-btn {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); box-shadow: 0 0 20px rgba(255,107,107,0.6); }
        }
        
        .gift-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .gift-card {
            background: var(--bg-secondary);
            border-radius: 48px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            animation: slideUp 0.4s ease;
        }
        
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .gift-item {
            background: linear-gradient(135deg, #ffd700, #ffb347);
            border-radius: 24px;
            padding: 20px;
            margin: 15px 0;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .gift-item:active {
            transform: scale(0.98);
        }
        
        .gift-actions {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }
        
        .gift-action-btn {
            flex: 1;
            padding: 12px;
            border-radius: 30px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        
        .accept-btn {
            background: var(--success);
            color: white;
        }
        
        .decline-btn {
            background: var(--danger);
            color: white;
        }
        
        .cake-message {
            background: linear-gradient(135deg, #ffd89b, #c7e9fb);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
        }
        
        .confetti {
            position: fixed;
            pointer-events: none;
            z-index: 3000;
            animation: fall linear forwards;
        }
        
        @keyframes fall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }

        .contacts-panel.hide {

            padding: 20px 16px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);

            height: 44px;

            cursor: pointer;

        .msg-input {

            .message { max-width: 85%; }
        }
    </style>

<script type="module">
    import * as THREE from 'three';
    window.THREE = THREE;
    
    window.initDetailedCake = function(containerId) {
        const container = document.getElementById(containerId);
        if (!container) return null;
        
        const width = container.clientWidth || 220;
        const height = container.clientHeight || 220;
        const scene = new THREE.Scene();
        scene.background = null;
        
        const camera = new THREE.PerspectiveCamera(45, width/height, 0.1, 1000);
        camera.position.set(0, 1.5, 4.5);
        camera.lookAt(0, 1.2, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(width, height);
        renderer.setClearColor(0x000000, 0);
        container.innerHTML = '';
        container.appendChild(renderer.domElement);
        
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xfff5e6, 1);
        mainLight.position.set(2, 3, 2);
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(0xffaa88, 0.5);
        fillLight.position.set(1, 2, 2);
        scene.add(fillLight);
        
        const bottomCake = new THREE.Mesh(
            new THREE.CylinderGeometry(1.3, 1.3, 0.45, 48),
            new THREE.MeshStandardMaterial({ color: 0xd4a373, roughness: 0.2 })
        );
        bottomCake.position.y = 0.225;
        scene.add(bottomCake);
        
        const bottomIcing = new THREE.Mesh(
            new THREE.CylinderGeometry(1.35, 1.35, 0.12, 48),
            new THREE.MeshStandardMaterial({ color: 0xf8e8d0 })
        );
        bottomIcing.position.y = 0.45;
        scene.add(bottomIcing);
        
        const middleCake = new THREE.Mesh(
            new THREE.CylinderGeometry(1.0, 1.0, 0.4, 48),
            new THREE.MeshStandardMaterial({ color: 0xb5835a })
        );
        middleCake.position.y = 0.75;
        scene.add(middleCake);
        
        const middleIcing = new THREE.Mesh(
            new THREE.CylinderGeometry(1.05, 1.05, 0.1, 48),
            new THREE.MeshStandardMaterial({ color: 0xf8e8d0 })
        );
        middleIcing.position.y = 0.95;
        scene.add(middleIcing);
        
        const topCake = new THREE.Mesh(
            new THREE.CylinderGeometry(0.7, 0.7, 0.38, 48),
            new THREE.MeshStandardMaterial({ color: 0x9c6e42 })
        );
        topCake.position.y = 1.2;
        scene.add(topCake);
        
        const topIcing = new THREE.Mesh(
            new THREE.CylinderGeometry(0.75, 0.75, 0.1, 48),
            new THREE.MeshStandardMaterial({ color: 0xf8e8d0 })
        );
        topIcing.position.y = 1.4;
        scene.add(topIcing);
        
        const candlePositions = [-0.35, 0, 0.35];
        candlePositions.forEach((x, idx) => {
            const candle = new THREE.Mesh(
                new THREE.CylinderGeometry(0.09, 0.1, 0.45, 12),
                new THREE.MeshStandardMaterial({ color: idx === 1 ? 0xffaa66 : 0xff6b6b })
            );
            candle.position.set(x, 1.65, 0);
            scene.add(candle);
            
            const flame = new THREE.Mesh(
                new THREE.ConeGeometry(0.07, 0.15, 8),
                new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0xff4400, emissiveIntensity: 0.6 })
            );
            flame.position.set(x, 1.88, 0);
            scene.add(flame);
        });
        
        const berryMat = new THREE.MeshStandardMaterial({ color: 0xdd2244 });
        for (let i = 0; i < 8; i++) {
            const berry = new THREE.Mesh(new THREE.SphereGeometry(0.07, 8, 8), berryMat);
            const angle = (i / 8) * Math.PI * 2;
            berry.position.set(Math.cos(angle) * 0.55, 1.48, Math.sin(angle) * 0.55);
            scene.add(berry);
        }
        
        let angle = 0;
        function animate() {
            requestAnimationFrame(animate);
            angle += 0.008;
            scene.rotation.y = angle;
            renderer.render(scene, camera);
        }
        animate();
        
        return { scene, camera, renderer };
    };
</script>

    function hashPassword(pwd) {
        let hash = 0;
        for (let i = 0; i < pwd.length; i++) {
            hash = ((hash << 5) - hash) + pwd.charCodeAt(i);
            hash = hash & hash;
        }
        return hash.toString(16);
    }
    
    function isValidPassword(pwd) {
        return /^\d{6}$/.test(pwd);
    }
    
    function generateId() {
        return Math.floor(100000 + Math.random() * 900000).toString();
    }
    
    function generateChatId() {
        return Date.now().toString(36) + Math.random().toString(36).substr(2, 6);
    }
    
    async function userExists(uid) {
        const snap = await db.ref(`users/${uid}`).once('value');
        return snap.exists();
    }
    
    async function registerUser(uid, name, password) {
        await db.ref(`users/${uid}`).set({
            id: uid, name, password: hashPassword(password),
            inventory: { cakes: 0, pendingGifts: [] },
            createdAt: Date.now()
        });
        return true;
    }
    
    async function verifyUser(uid, name, password) {
        const snap = await db.ref(`users/${uid}`).once('value');
        if (!snap.exists()) return false;
        const data = snap.val();
        if (data.name !== name) return false;
        if (!data.password || data.password === '') return true;
        return data.password === hashPassword(password);
    }

        const snap = await db.ref(`users/${uid}/name`).once('value');
        return snap.val() || uid;
    }

    async function sendGift(toUserId) {
        if (userInventory.cakes < 1) {
            alert('У вас нет тортиков! Получите подарок в главном меню 🎂');
            return false;
        }
        
        const giftId = Date.now() + '_' + Math.random().toString(36).substr(2, 8);
        const giftData = {
            id: giftId,
            fromId: currentUser.id,
            fromName: currentUser.name,
            timestamp: Date.now(),
            status: 'pending'
        };
        
        await db.ref(`users/${toUserId}/inventory/pendingGifts`).push(giftData);
        
        const message = {
            id: giftId,
            type: 'gift_request',
            fromId: currentUser.id,
            fromName: currentUser.name,
            giftId: giftId,
            timestamp: Date.now(),
            timeStr: new Date().toLocaleTimeString(),
            status: 'pending'
        };
        
        const path = `messages/${getDialogId(currentUser.id, toUserId)}`;
        await db.ref(path).push(message);
        
        userInventory.cakes--;
        await saveInventory();
        
        return true;
    }
    
    async function acceptGift(giftId, fromUserId) {
        const senderSnap = await db.ref(`users/${fromUserId}/inventory`).once('value');
        const senderInv = senderSnap.val() || { cakes: 0 };
        senderInv.cakes = Math.max(0, (senderInv.cakes || 0) - 1);
        await db.ref(`users/${fromUserId}/inventory`).set(senderInv);
        
        userInventory.cakes = (userInventory.cakes || 0) + 2;
        userInventory.pendingGifts = (userInventory.pendingGifts || []).filter(g => g.id !== giftId);
        await saveInventory();
        
        const path = `messages/${getDialogId(currentUser.id, fromUserId)}`;
        const msgsSnap = await db.ref(path).once('value');
        msgsSnap.forEach(child => {
            const msg = child.val();
            if (msg.giftId === giftId) {
                db.ref(`${path}/${child.key}/status`).set('accepted');
            }
        });
        
        createConfetti();
        updateCakeCountDisplay();
        return true;
    }
    
    async function declineGift(giftId, fromUserId) {
        userInventory.pendingGifts = (userInventory.pendingGifts || []).filter(g => g.id !== giftId);
        await saveInventory();
        
        const path = `messages/${getDialogId(currentUser.id, fromUserId)}`;
        const msgsSnap = await db.ref(path).once('value');
        msgsSnap.forEach(child => {
            const msg = child.val();
            if (msg.giftId === giftId) {
                db.ref(`${path}/${child.key}/status`).set('declined');
            }
        });
    }
    
    function getDialogId(uid1, uid2) {
        return [uid1, uid2].sort().join('_');
    }

    function loadMessages() {
        if (currentMessagesRef) currentMessagesRef.off();
        if (!activeChat) return;
        
        const path = `messages/${getDialogId(currentUser.id, activeChat)}`;
        currentMessagesRef = db.ref(path);
        
        currentMessagesRef.on('value', (snapshot) => {
            const messages = [];
            snapshot.forEach(child => messages.push({ key: child.key, ...child.val() }));
            messages.sort((a,b) => a.timestamp - b.timestamp);
            
            const container = document.getElementById('messagesContainer');
            if (!container) return;
            
            if (messages.length === 0) {
                container.innerHTML = '<div class="empty-chat">💬 Напишите первое сообщение</div>';
                return;
            }
            
            let html = '';
            for (const msg of messages) {
                const isOut = msg.fromId === currentUser.id;
                
                if (msg.type === 'gift_request') {
                    if (msg.status === 'accepted') {
                        html += `<div class="message ${isOut ? 'out' : 'in'}">
                            <div class="message-sender">${isOut ? 'Вы' : escapeHtml(msg.fromName)}</div>
                            <div class="cake-message">🎂 ПОДАРОК ПРИНЯТ! 🎉<br>Получатель получил +2 тортика!</div>
                            <div class="message-time">${msg.timeStr}</div>
                        </div>`;
                    } else if (msg.status === 'declined') {
                        html += `<div class="message ${isOut ? 'out' : 'in'}">
                            <div class="message-sender">${isOut ? 'Вы' : escapeHtml(msg.fromName)}</div>
                            <div class="cake-message" style="background:#ffcccc;">❌ ПОДАРОК ОТКЛОНЕН</div>
                            <div class="message-time">${msg.timeStr}</div>
                        </div>`;
                    } else {
                        html += `<div class="message ${isOut ? 'out' : 'in'}">
                            <div class="message-sender">${isOut ? 'Вы' : escapeHtml(msg.fromName)}</div>
                            <div class="cake-message">
                                <span>🎂🎁</span>
                                <div><strong>Вам дарят подарок!</strong></div>
                                ${!isOut ? `<button class="gift-action-btn accept-btn" style="margin-top:10px; padding:8px 16px;" onclick="showGiftRequestModal('${msg.giftId}', '${msg.fromId}', '${escapeHtml(msg.fromName)}')">🎁 Посмотреть подарок</button>` : '<div>Ожидание ответа...</div>'}
                            </div>
                            <div class="message-time">${msg.timeStr}</div>
                        </div>`;
                    }
                } else {
                    html += `<div class="message ${isOut ? 'out' : 'in'}">
                        <div class="message-sender">${isOut ? 'Вы' : escapeHtml(msg.fromName)}</div>
                        <div>${escapeHtml(msg.text || '')}</div>
                        <div class="message-time">${msg.timeStr}</div>
                    </div>`;
                }
            }
            container.innerHTML = html;
            setTimeout(() => container.scrollTop = container.scrollHeight, 100);
        });
    }
    
    window.showGiftRequestModal = showGiftRequestModal;
    
    async function loadContactsAndChats() {
        if (!currentUser) return;
        
        db.ref('messages').on('value', async (snapshot) => {
            const contactsMap = new Map();
            snapshot.forEach(dialog => {
                const parts = dialog.key.split('_');
                if (parts.length === 2 && parts.includes(currentUser.id)) {
                    const otherId = parts[0] === currentUser.id ? parts[1] : parts[0];
                    contactsMap.set(otherId, true);
                }
            });
            
            contacts = [];
            for (const cid of contactsMap.keys()) {
                contacts.push({ id: cid, name: await getUserName(cid), type: 'user' });
            }
            renderAllChats();
        });
        
        db.ref(`userGroups/${currentUser.id}`).on('value', async (snapshot) => {
            groups = [];
            const groupIds = snapshot.val() || {};
            for (const groupId of Object.keys(groupIds)) {
                const groupSnap = await db.ref(`groups/${groupId}`).once('value');
                if (groupSnap.exists()) {
                    groups.push({ ...groupSnap.val(), type: 'group' });
                }
            }
            renderAllChats();
        });
        
        db.ref(`userChannels/${currentUser.id}`).on('value', async (snapshot) => {
            channels = [];
            const channelIds = snapshot.val() || {};
            for (const channelId of Object.keys(channelIds)) {
                const channelSnap = await db.ref(`channels/${channelId}`).once('value');
                if (channelSnap.exists()) {
                    channels.push({ ...channelSnap.val(), type: 'channel' });
                }
            }
            renderAllChats();
        });
        
        db.ref(`users/${currentUser.id}/inventory/pendingGifts`).on('value', (snapshot) => {
            const pending = [];
            snapshot.forEach(child => {
                pending.push({ id: child.key, ...child.val() });
            });
            userInventory.pendingGifts = pending;
            
            if (pending.length > 0 && !document.querySelector('.gift-modal')) {
                const latest = pending[pending.length - 1];
                showGiftRequestModal(latest.id, latest.fromId, latest.fromName);
            }
        });
    }
    
    function renderAllChats() {
        const container = document.getElementById('contactsList');
        if (!container) return;
        
        let html = '';
        if (currentTab === 'chats') {
            if (contacts.length > 0) {
                html += '<div class="section-title">💬 ЛИЧНЫЕ ЧАТЫ</div>';
                for (const contact of contacts) {
                    const isActive = (activeChat === contact.id);
                    html += `
                        <div class="chat-item ${isActive ? 'active' : ''}" onclick="selectContact('${contact.id}', 'user')">
                            <div class="chat-avatar">${escapeHtml(contact.name.charAt(0).toUpperCase())}</div>
                            <div class="chat-info">
                                <div class="chat-name">${escapeHtml(contact.name)}</div>
                                <div class="chat-id-hidden" onclick="event.stopPropagation(); showIdPopup('${contact.id}')">🆔 показать ID</div>
                            </div>
                            <button class="delete-chat-btn" onclick="event.stopPropagation(); deleteContact('${contact.id}')">🗑️</button>
                        </div>
                    `;
                }
            }
            
            if (groups.length > 0) {
                html += '<div class="section-title">👥 ГРУППЫ</div>';
                for (const group of groups) {
                    html += `
                        <div class="chat-item" onclick="selectContact('${group.id}', 'group')">
                            <div class="chat-avatar">👥</div>
                            <div class="chat-info">
                                <div class="chat-name">${escapeHtml(group.name)}</div>
                                <div class="chat-id-hidden" onclick="event.stopPropagation(); showIdPopup('${group.id}')">🆔 ID</div>
                            </div>
                        </div>
                    `;
                }
            }
            
            if (channels.length > 0) {
                html += '<div class="section-title">📢 КАНАЛЫ</div>';
                for (const channel of channels) {
                    html += `
                        <div class="chat-item" onclick="selectContact('${channel.id}', 'channel')">
                            <div class="chat-avatar">📢</div>
                            <div class="chat-info">
                                <div class="chat-name">${escapeHtml(channel.name)}</div>
                                <div class="chat-id-hidden" onclick="event.stopPropagation(); showIdPopup('${channel.id}')">🆔 ID</div>
                            </div>
                        </div>
                    `;
                }
            }
            
            if (contacts.length === 0 && groups.length === 0 && channels.length === 0) {
                html = '<div class="empty-contacts">✨ Нет чатов. Найдите друзей по ID или создайте группу/канал</div>';
            }
        }
        container.innerHTML = html;
    }
    
    window.selectContact = async function(chatId, type) {
        if (!chatId) return;
        
        let name = '';
        if (type === 'user') {
            let contact = contacts.find(c => c.id === chatId);
            if (!contact && await userExists(chatId)) {
                contact = { id: chatId, name: await getUserName(chatId) };
                contacts.push(contact);
            }
            name = contact?.name || chatId;
        } else if (type === 'group') {
            const group = groups.find(g => g.id === chatId);
            name = group?.name || chatId;
        } else if (type === 'channel') {
            const channel = channels.find(c => c.id === chatId);
            name = channel?.name || chatId;
        }
        
        activeChat = chatId;
        localStorage.setItem('glory_activeChat', JSON.stringify({ id: chatId, type }));
        
        const header = document.getElementById('chatHeader');
        if (header) {
            const typeIcon = type === 'user' ? '💬' : (type === 'group' ? '👥' : '📢');
            header.innerHTML = `
                <button class="back-to-contacts-btn" id="backToContactsBtn">✕</button>
                <div class="chat-info-header" onclick="showIdPopup('${chatId}')">
                    <div class="chat-name-header">${typeIcon} ${escapeHtml(name)}<span class="chat-id-clickable" style="font-size:0.6rem; margin-left:8px; background:var(--bg-input); padding:4px 8px; border-radius:20px;">🆔 ID</span></div>
                </div>
            `;
            document.getElementById('backToContactsBtn').onclick = () => showContacts();
        }
        
        loadMessages();
        showChat();
        document.getElementById('messageInput').disabled = false;
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('giftChatBtn').disabled = false;
    };
    
    async function deleteContact(contactId) {
        if (confirm('Удалить этот контакт?')) {
            contacts = contacts.filter(c => c.id !== contactId);
            if (activeChat === contactId) {
                activeChat = null;
                document.getElementById('messagesContainer').innerHTML = '<div class="empty-chat">💬 Выберите чат</div>';
                showContacts();
            }
            renderAllChats();
        }
    }

            feedback.textContent = '❌ Введите ID';

        modal.className = 'profile-modal';
        modal.innerHTML = `
            <div class="profile-card" style="background:var(--bg-secondary); border-radius:32px; padding:32px; width:90%; max-width:400px;">
                <h3 style="color:var(--text-primary); margin-bottom:16px;">${type === 'group' ? 'Вступить в группу' : 'Подписаться на канал'}</h3>
                <input type="text" id="joinId" placeholder="Введите ID" style="width:100%; padding:12px; background:var(--bg-input); border:1px solid var(--border-color); border-radius:12px; color:var(--text-primary); margin-bottom:12px;">
                <div style="display:flex; gap:12px; margin-top:16px;">
                    <button class="btn-primary" id="confirmJoin" style="flex:1; padding:12px; border-radius:30px; background:var(--accent-color); color:white; border:none;">${type === 'group' ? 'Вступить' : 'Подписаться'}</button>
                    <button class="btn-close" id="cancelJoin" style="flex:1; padding:12px; border-radius:30px; background:var(--bg-input); border:none; cursor:pointer;">Отмена</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        document.getElementById('confirmJoin').onclick = async () => {
            const id = document.getElementById('joinId').value.trim();
            if (!id) {
                alert('Введите ID');
                return;
            }
            const success = type === 'group' ? await joinGroup(id) : await joinChannel(id);
            if (success) {
                alert(`✅ ${type === 'group' ? 'Вы вступили в группу!' : 'Вы подписались на канал!'}`);
                modal.remove();
            } else {
                alert(`❌ ${type === 'group' ? 'Группа' : 'Канал'} не найден`);
            }
        };
        document.getElementById('cancelJoin').onclick = () => modal.remove();
    }
    
    function showIdPopup(id) {
        const popup = document.createElement('div');
        popup.className = 'id-modal';
        popup.textContent = `🆔 ${id}`;
        document.body.appendChild(popup);
        setTimeout(() => popup.remove(), 2000);
    }
    
    function showMenu() {
        document.querySelector('.menu-screen')?.classList.remove('hide');
        document.querySelector('.contacts-panel')?.classList.add('hide');
        document.querySelector('.chat-panel')?.classList.add('hide');
    }
    
    function showContacts() {
        document.querySelector('.menu-screen')?.classList.add('hide');
        document.querySelector('.contacts-panel')?.classList.remove('hide');
        document.querySelector('.chat-panel')?.classList.add('hide');
    }
    
    function showChat() {
        document.querySelector('.contacts-panel')?.classList.add('hide');
        document.querySelector('.chat-panel')?.classList.remove('hide');
    }
    
    function setTheme(theme) {
        document.body.className = theme + '-theme';
        localStorage.setItem('glory_theme', theme);
        document.querySelectorAll('.theme-option').forEach(opt => {
            if (opt.innerText.includes(theme === 'dark' ? 'Тёмная' : 'Светлая')) {
                opt.classList.add('active');
            } else {
                opt.classList.remove('active');
            }
        });
    }
    
    async function sendMessage() {
        const input = document.getElementById('messageInput');
        if (!input || !input.value.trim() || !activeChat) return;
        
        const message = {
            id: Date.now() + '_' + Math.random().toString(36).substr(2, 8),
            text: input.value.trim(),
            fromId: currentUser.id,
            fromName: currentUser.name,
            timestamp: Date.now(),
            timeStr: new Date().toLocaleTimeString(),
            type: 'text'
        };
        
        const path = `messages/${getDialogId(currentUser.id, activeChat)}`;
        await db.ref(path).push(message);
        input.value = '';
        input.style.height = 'auto';
    }
    
    function setTab(tab) {
        currentTab = tab;
        const tabBtns = document.querySelectorAll('.tab-btn');
        tabBtns.forEach(btn => {
            if (btn.dataset.tab === tab) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        
        const tabContent = document.getElementById('tabContent');
        if (!tabContent) return;
        
        if (tab === 'chats') {
            tabContent.innerHTML = '<div class="contacts-list" id="contactsList"></div>';
            renderAllChats();
        } else {
            tabContent.innerHTML = `
                <div class="search-section">
                    <div class="search-title">🔍 НАЙТИ ПОЛЬЗОВАТЕЛЯ</div>
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Введите ID пользователя">
                        <button id="searchBtn">Найти</button>
                    </div>
                    <div class="search-feedback" id="searchFeedback"></div>
                </div>
                <div class="search-section">
                    <button class="create-btn" id="createGroupBtn">👥 + Создать группу</button>
                </div>
                <div class="search-section">
                    <button class="create-btn" id="createChannelBtn">📢 + Создать канал</button>
                </div>
                <div class="search-section">
                    <button class="create-btn" id="joinGroupBtn">🔗 Вступить в группу по ID</button>
                </div>
                <div class="search-section">
                    <button class="create-btn" id="joinChannelBtn">🔗 Подписаться на канал по ID</button>
                </div>
            `;
            
            document.getElementById('searchBtn').onclick = searchAndAddUser;
            document.getElementById('createGroupBtn').onclick = () => showCreateModal('group');
            document.getElementById('createChannelBtn').onclick = () => showCreateModal('channel');
            document.getElementById('joinGroupBtn').onclick = () => showJoinModal('group');
            document.getElementById('joinChannelBtn').onclick = () => showJoinModal('channel');
        }
    }
    
    function showLogin() {
        root.innerHTML = `<div class="login-screen"><div class="login-card"><h1>GLORY</h1><p>Подарки с 3D тортом 🎂</p><div class="login-tabs"><div class="login-tab active" data-tab="new" onclick="setLoginTab('new')">🆕 Регистрация</div><div class="login-tab" data-tab="existing" onclick="setLoginTab('existing')">🔑 Вход</div></div>
            <div id="newIdSection"><input type="text" id="loginName" placeholder="Ваше имя"><div class="id-row"><input type="text" id="loginId" readonly><button id="genIdBtn">🔄</button></div><input type="password" id="loginPassword" placeholder="Пароль (6 цифр)" maxlength="6"><div class="password-hint">🔒 6-значный цифровой пароль</div><button class="login-btn" id="loginBtn">Создать аккаунт</button></div>
            <div id="existingIdSection" style="display:none;"><input type="text" id="existingIdInput" placeholder="Ваш ID"><input type="text" id="existingNameInput" placeholder="Ваше имя"><input type="password" id="existingPasswordInput" placeholder="Пароль (6 цифр)" maxlength="6"><button class="login-btn" id="loginExistingBtn">Войти</button></div></div></div>`;
        
        document.getElementById('loginId').value = generateId();
        document.getElementById('genIdBtn').onclick = () => document.getElementById('loginId').value = generateId();
        
        document.getElementById('loginBtn').onclick = async () => {
            const name = document.getElementById('loginName').value.trim();
            const uid = document.getElementById('loginId').value.trim();
            const pwd = document.getElementById('loginPassword').value;
            if (!name) { alert('Введите имя'); return; }
            if (!isValidPassword(pwd)) { alert('Пароль должен быть 6 цифр'); return; }
            if (await userExists(uid)) { alert('ID занят'); document.getElementById('loginId').value = generateId(); return; }
            await registerUser(uid, name, pwd);
            currentUser = { id: uid, name };
            localStorage.setItem('gloryUser', JSON.stringify(currentUser));
            showMessenger();
        };
        
        document.getElementById('loginExistingBtn').onclick = async () => {
            const uid = document.getElementById('existingIdInput').value.trim();
            const name = document.getElementById('existingNameInput').value.trim();
            const pwd = document.getElementById('existingPasswordInput').value;
            if (!uid || !name) { alert('Введите ID и имя'); return; }
            if (await verifyUser(uid, name, pwd)) {
                currentUser = { id: uid, name };
                localStorage.setItem('gloryUser', JSON.stringify(currentUser));
                showMessenger();
            } else alert('❌ Неверные данные');
        };
        
        window.setLoginTab = (tab) => {
            document.querySelectorAll('.login-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
            document.getElementById('newIdSection').style.display = tab === 'new' ? 'block' : 'none';
            document.getElementById('existingIdSection').style.display = tab === 'existing' ? 'block' : 'none';
        };
    }
    
    async function showMessenger() {
        const savedTheme = localStorage.getItem('glory_theme') || 'dark';
        document.body.className = savedTheme + '-theme';
        await loadInventory();
        
        root.innerHTML = `
            <div class="app">
                <div class="menu-screen">
                    <div class="menu-card">
                        <div class="menu-logo">✨</div>
                        <div class="menu-title">GLORY</div>
                        <div class="menu-subtitle">Подарки с 3D тортом 🎂</div>
                        <div id="cake3dMain" class="cake-3d-container" style="width:220px; height:220px; margin:0 auto 20px;"></div>
                        <div class="menu-buttons">
                            <button class="menu-btn" id="startBtn">🚀 Начать общение</button>
                            <button class="menu-btn secondary" id="profileBtn">👤 Мой профиль <span id="cakeCountDisplay" style="margin-left:8px; background:var(--accent-color); padding:2px 8px; border-radius:20px;">${userInventory.cakes || 0} 🎂</span></button>
                            <button class="menu-btn gift-btn" id="getGiftBtn" style="${userInventory.cakes >= 1 ? 'display:none;' : ''}">🎁 ПОЛУЧИТЬ ПОДАРОК 🎂</button>
                        </div>
                        <p style="font-size:0.7rem; margin-top:20px; color:var(--text-muted);">🎂 С выпуском 28.03.26!<br>От разработчика с любовью ❤️</p>
                    </div>
                </div>
                <div class="contacts-panel hide">
                    <div class="contacts-header">
                        <button class="close-contacts-btn" id="closeContactsBtn">✕</button>
                        <div class="user-card" id="profileCard">
                            <div class="user-avatar">${escapeHtml(currentUser.name.charAt(0).toUpperCase())}</div>
                            <div class="user-info">
                                <div class="user-name">${escapeHtml(currentUser.name)}</div>
                                <div class="user-id-hidden" id="showMyIdBtn">🆔 показать ID</div>
                                <div style="font-size:0.7rem; margin-top:5px;">🎂 Тортиков: <span id="profileCakeCount">${userInventory.cakes || 0}</span></div>
                            </div>
                        </div>
                        <div class="theme-selector">
                            <div class="theme-option dark" data-theme="dark" onclick="setTheme('dark')">🌙 Тёмная</div>
                            <div class="theme-option light" data-theme="light" onclick="setTheme('light')">☀️ Светлая</div>
                        </div>
                        <button class="exit-contacts-btn" id="exitContactsBtn">🏠 Выйти в меню</button>
                        <button class="logout-btn" id="logoutBtn">🚪 Выйти</button>
                    </div>
                    <div class="tabs">
                        <button class="tab-btn active" data-tab="chats" onclick="setTab('chats')">💬 Чаты</button>
                        <button class="tab-btn" data-tab="search" onclick="setTab('search')">🔍 Поиск</button>
                    </div>
                    <div id="tabContent">
                        <div class="contacts-list" id="contactsList"></div>
                    </div>
                </div>
                <div class="chat-panel hide">
                    <div class="chat-header" id="chatHeader">
                        <button class="back-to-contacts-btn" id="backToContactsBtn">✕</button>
                        <div class="chat-info-header"><div class="chat-name-header">GLORY</div></div>
                    </div>
                    <div class="messages" id="messagesContainer"><div class="empty-chat">💬 Выберите чат</div></div>
                    <div class="input-area">
                        <button class="attach-btn" id="attachBtn" disabled>📎</button>
                        <button class="gift-chat-btn" id="giftChatBtn" disabled>🎁</button>
                        <textarea class="msg-input" id="messageInput" placeholder="Сообщение..." disabled rows="1"></textarea>
                        <button class="send-btn" id="sendBtn" disabled>📩</button>
                    </div>
                </div>
            </div>`;
        
        setTimeout(() => {
            if (window.initDetailedCake) {
                window.initDetailedCake('cake3dMain');
            }
        }, 100);
        
        document.getElementById('startBtn').onclick = () => showContacts();
        document.getElementById('profileBtn').onclick = () => showIdPopup(currentUser.id);
        document.getElementById('getGiftBtn').onclick = () => show3DCakeModal('🎂 ВОЛШЕБНЫЙ ТОРТ 🎂', getFreeGift, true, "🎁 ПОЛУЧИТЬ ПОДАРОК");
        document.getElementById('showMyIdBtn').onclick = () => showIdPopup(currentUser.id);
        document.getElementById('profileCard').onclick = () => showIdPopup(currentUser.id);
        document.getElementById('exitContactsBtn').onclick = () => showMenu();
        document.getElementById('closeContactsBtn').onclick = () => showMenu();
        document.getElementById('logoutBtn').onclick = () => { localStorage.clear(); location.reload(); };
        document.getElementById('sendBtn').onclick = () => sendMessage();
        document.getElementById('giftChatBtn').onclick = () => sendGiftToChat();
        document.getElementById('attachBtn').onclick = () => alert('📎 Прикрепление фото (в разработке)');
        
        const msgInput = document.getElementById('messageInput');
        if (msgInput) {
            msgInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            msgInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 100) + 'px';
            });
        }
        
        window.setTab = setTab;
        window.setTheme = setTheme;
        window.deleteContact = deleteContact;
        window.selectContact = selectContact;
        window.showIdPopup = showIdPopup;
        
        await loadContactsAndChats();
        setTab('chats');
        showMenu();
        
        const savedChat = localStorage.getItem('glory_activeChat');
        if (savedChat) {
            try {
                const { id, type } = JSON.parse(savedChat);
                setTimeout(() => selectContact(id, type), 500);
            } catch(e) {}
        }
        
        document.querySelectorAll('.theme-option').forEach(opt => {
            if (opt.dataset.theme === savedTheme) opt.classList.add('active');
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    const savedUser = localStorage.getItem('gloryUser');
    if (savedUser && db) {
        try {
            currentUser = JSON.parse(savedUser);
            showMessenger();
        } catch(e) { showLogin(); }
    } else {
        showLogin();
    }
</script>
</body>
</html>
