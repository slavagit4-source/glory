    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0a0a;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111;
            --bg-tertiary: #0c0c0c;
            --bg-card: #1a1a1a;
            --bg-input: #1a1a1a;
            --border-color: #222;
            --text-primary: #fff;
            --text-secondary: #888;
            --text-muted: #666;
            --accent-color: #7c4dff;
            --message-out: #7c4dff;
            --message-in: #1a1a1a;
            --success: #4caf50;
            --danger: #ff5e5e;
            --online: #4caf50;
            --offline: #666;
        }
        
        body.light-theme {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f0f0f0;
            --bg-card: #ffffff;
            --bg-input: #f5f5f5;
            --border-color: #e0e0e0;
            --text-primary: #1a1a1a;
            --text-secondary: #666;
            --message-in: #e9ecef;
        }
        
        body.blue-theme {
            --bg-primary: #0a1929;
            --bg-secondary: #0c1c2e;
            --bg-tertiary: #0a1a2a;
            --bg-card: #0f2a3a;
            --accent-color: #2196f3;
            --message-out: #2196f3;
            --message-in: #1e3a5f;
        }
        
        body.green-theme {
            --bg-primary: #0a2a1a;
            --bg-secondary: #0c2a1a;
            --bg-tertiary: #0a2a18;
            --bg-card: #1a3a2a;
            --accent-color: #4caf50;
            --message-out: #4caf50;
            --message-in: #2a5a3a;
        }
        
        body.purple-theme {
            --bg-primary: #1a0a2a;
            --bg-secondary: #1a0a2a;
            --bg-tertiary: #180a24;
            --bg-card: #2a1a3a;
            --accent-color: #9c27b0;
            --message-out: #9c27b0;
            --message-in: #4a2a6a;
        }

        .app {
            display: flex;
            height: 100vh;
            width: 100%;
            background: var(--bg-primary);
            overflow: hidden;
        }

        .contacts-panel {
            width: 320px;
            background: var(--bg-secondary);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            height: 100%;
            flex-shrink: 0;
        }

        .contacts-header {
            padding: 20px 16px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
        }

        .user-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            margin-bottom: 16px;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
            overflow: hidden;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .user-id {
            font-family: monospace;
            font-size: 0.65rem;
            color: var(--text-secondary);
        }

        .theme-selector {
            display: flex;
            gap: 8px;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .theme-option {
            flex: 1;
            padding: 8px 4px;
            border-radius: 30px;
            cursor: pointer;
            text-align: center;
            font-size: 0.7rem;
            font-weight: 500;
            border: 2px solid transparent;
            background: var(--bg-input);
            color: var(--text-primary);
        }

        .theme-option.active {
            border-color: var(--accent-color);
            background: var(--accent-color);
            color: white;
        }

        .logout-btn {
            background: linear-gradient(135deg, var(--danger), #ff3e3e);
            border: none;
            color: white;
            padding: 12px 16px;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .install-btn {
            background: var(--accent-color);
            border: none;
            color: white;
            padding: 10px 16px;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            font-weight: 500;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-tertiary);
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85rem;
        }

        .tab-btn.active {
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
        }

        .search-section {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .search-title {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .search-box {
            display: flex;
            gap: 8px;
        }

        .search-box input {
            flex: 1;
            padding: 10px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            outline: none;
        }

        .search-box button, .create-btn {
            background: var(--accent-color);
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 12px;
            cursor: pointer;
        }

        .create-btn {
            background: var(--bg-input);
            color: var(--text-secondary);
            width: 100%;
            margin-top: 8px;
        }

        .contacts-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .section-title {
            padding: 8px 12px;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 2px;
        }

        .chat-item.active {
            background: var(--accent-color);
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
            background: var(--accent-color);
            position: relative;
        }

        .status-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid var(--bg-secondary);
        }

        .status-online { background: var(--online); }
        .status-offline { background: var(--offline); }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 500;
            color: var(--text-primary);
        }

        .chat-type {
            font-size: 0.65rem;
            color: var(--text-secondary);
        }

        .call-btns {
            display: flex;
            gap: 5px;
        }

        .call-btn {
            background: var(--success);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .delete-chat-btn {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            padding: 4px 8px;
            font-size: 0.9rem;
        }

        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            height: 100%;
            overflow: hidden;
        }

        .chat-header {
            padding: 16px 20px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-primary);
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .chat-info-header {
            flex: 1;
            cursor: pointer;
        }

        .chat-name-header {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 20px;
            word-wrap: break-word;
        }

        .message.out {
            background: var(--message-out);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.in {
            background: var(--message-in);
            color: var(--text-primary);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            cursor: pointer;
        }

        .message-sender {
            font-size: 0.6rem;
            margin-bottom: 4px;
            opacity: 0.7;
        }

        .message-time {
            font-size: 0.5rem;
            opacity: 0.5;
            margin-top: 4px;
            text-align: right;
        }

        .input-area {
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .attach-btn {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .msg-input {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            font-size: 0.95rem;
            color: var(--text-primary);
            outline: none;
            resize: none;
            max-height: 100px;
        }

        .send-btn {
            background: var(--accent-color);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-chat, .empty-contacts {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px;
        }

        .call-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .call-container {
            background: var(--bg-secondary);
            border-radius: 48px;
            padding: 40px;
            text-align: center;
            width: 90%;
            max-width: 350px;
        }

        .call-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 20px;
        }

        .call-name {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .call-status {
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .call-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .call-btn-answer, .call-btn-end {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .call-btn-answer {
            background: var(--success);
            color: white;
        }

        .call-btn-end {
            background: var(--danger);
            color: white;
        }

        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 2000;
            display: flex;
            flex-direction: column;
        }

        .remote-video {
            flex: 1;
            background: #1a1a1a;
        }

        .remote-video video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .local-video {
            position: absolute;
            bottom: 100px;
            right: 20px;
            width: 100px;
            height: 150px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid white;
            background: #000;
        }

        .local-video video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .call-controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background: rgba(0,0,0,0.6);
        }

        .call-control-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .call-control-btn.end-call {
            background: var(--danger);
            color: white;
        }

        @media (max-width: 768px) {
            .contacts-panel {
                position: fixed;
                left: 0;
                top: 0;
                width: 100%;
                height: 100%;
                z-index: 10;
                transform: translateX(0);
                transition: transform 0.3s;
            }
            .contacts-panel.hide { transform: translateX(-100%); }
            .chat-panel {
                position: fixed;
                left: 0;
                top: 0;
                width: 100%;
                height: 100%;
                z-index: 20;
                transform: translateX(100%);
                transition: transform 0.3s;
            }
            .chat-panel.show { transform: translateX(0); }
            .back-btn { display: flex; align-items: center; justify-content: center; }
            .message { max-width: 85%; }
            .local-video { width: 80px; height: 120px; bottom: 80px; }
            .call-control-btn { width: 50px; height: 50px; }
        }

        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: var(--bg-primary);
        }

        .login-card {
            background: var(--bg-secondary);
            border-radius: 32px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
        }

        .login-card h1 {
            color: var(--accent-color);
            font-size: 2rem;
        }

        .login-card input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .id-row {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .id-row input { flex: 1; margin-bottom: 0; }
        .id-row button {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px 20px;
            border-radius: 16px;
            cursor: pointer;
        }

        .login-btn {
            background: linear-gradient(135deg, var(--accent-color), #6a3dff);
            border: none;
            color: white;
            width: 100%;
            padding: 14px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }

        .login-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .login-tab {
            flex: 1;
            padding: 10px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            cursor: pointer;
            text-align: center;
            color: var(--text-secondary);
        }

        .login-tab.active {
            background: linear-gradient(135deg, var(--accent-color), #6a3dff);
            color: white;
        }

        .profile-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .profile-card {
            background: var(--bg-secondary);
            border-radius: 32px;
            padding: 32px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .profile-card h3 {
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .profile-card input {
            width: 100%;
            padding: 12px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .profile-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .profile-buttons button {
            flex: 1;
            padding: 12px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-primary {
            background: var(--accent-color);
            color: white;
        }

        .btn-close {
            background: var(--bg-input);
            color: var(--text-secondary);
        }

        .notification-permission {
            background: var(--bg-card);
            padding: 10px;
            border-radius: 12px;
            margin-top: 8px;
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-secondary);
            cursor: pointer;
        }
    </style>
</head>
<body>
<div id="root"></div>

<script>
    const FIREBASE_CONFIG = {
        apiKey: "AIzaSyDxRMLwUU96rFAtuCdLizHisx9UxIyyNlM",
        authDomain: "my-messenger-a7ad1.firebaseapp.com",
        projectId: "my-messenger-a7ad1",
        storageBucket: "my-messenger-a7ad1.firebasestorage.app",
        messagingSenderId: "27711084677",
        appId: "1:27711084677:web:5f2bc2cb684008e89531ec"
    };

    let db = null;
    let storage = null;
    
    // WebRTC
    let localStream = null;
    let peerConnection = null;
    let currentCallId = null;
    let currentCallWith = null;
    let isCallActive = false;
    let notificationPermission = false;
    let deferredPrompt = null;
    
    const configuration = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' }
        ]
    };
    
    try {
        firebase.initializeApp(FIREBASE_CONFIG);
        db = firebase.database();
        storage = firebase.storage();
        console.log('✅ Firebase готов');
    } catch(e) {
        console.error('Firebase error:', e);
    }

    let currentUser = null;
    let activeChat = null;
    let activeChatType = null;
    let contacts = [];
    let groups = [];
    let channels = [];
    let currentMessagesRef = null;
    let currentTab = 'chats';
    let callListenerRef = null;
    let messagesListenerRef = null;
    
    const root = document.getElementById('root');
    
    // ============ PWA УСТАНОВКА И УВЕДОМЛЕНИЯ ============
    
    // Регистрация Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered:', reg))
            .catch(err => console.log('SW error:', err));
    }
    
    // Запрос разрешения на уведомления
    async function requestNotificationPermission() {
        if (!('Notification' in window)) {
            console.log('Браузер не поддерживает уведомления');
            return false;
        }
        
        const permission = await Notification.requestPermission();
        notificationPermission = permission === 'granted';
        
        if (notificationPermission) {
            console.log('✅ Уведомления разрешены');
            document.getElementById('notificationStatus')?.remove();
        }
        return notificationPermission;
    }
    
    // Отправка уведомления
    function sendNotification(title, body, url = '/') {
        if (!notificationPermission) return;
        
        if (document.hidden) {
            // Если страница неактивна - показываем уведомление
            new Notification(title, {
                body: body,
                icon: 'https://via.placeholder.com/192x192/7c4dff/ffffff?text=G',

    // ============ WEBRTC ЗВОНКИ ============
    
    async function startCall(targetUserId, isVideo) {
        if (!targetUserId || isCallActive) return;
        
        currentCallWith = targetUserId;
        currentCallId = Date.now().toString();
        
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: isVideo });
            
            peerConnection = new RTCPeerConnection(configuration);
            
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    db.ref(`calls/${currentCallId}/candidates/${targetUserId}`).push(event.candidate.toJSON());
                }
            };
            
            peerConnection.ontrack = (event) => {
                const remoteVideo = document.getElementById('remoteVideo');
                if (remoteVideo && event.streams[0]) {
                    remoteVideo.srcObject = event.streams[0];
                }
            };
            
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            
            await db.ref(`calls/${currentCallId}`).set({
                from: currentUser.id,
                to: targetUserId,
                offer: { type: offer.type, sdp: offer.sdp },
                status: 'waiting',
                isVideo: isVideo,
                startTime: Date.now()
            });
            
            showCallModal(targetUserId, 'waiting', isVideo);
            
            const callRef = db.ref(`calls/${currentCallId}`);
            const answerListener = callRef.on('value', async (snapshot) => {
                const data = snapshot.val();
                if (!data) return;
                
                if (data.status === 'answered' && data.answer) {
                    const answer = new RTCSessionDescription(data.answer);
                    await peerConnection.setRemoteDescription(answer);
                    startCallUI(targetUserId, isVideo);
                    callRef.off();
                } else if (data.status === 'rejected') {
                    endCall();
                    alert('Звонок отклонен');
                    callRef.off();
                } else if (data.status === 'ended') {
                    endCall();
                    callRef.off();
                }
            });
            
            db.ref(`calls/${currentCallId}/candidates/${currentUser.id}`).on('child_added', (snapshot) => {
                const candidate = new RTCIceCandidate(snapshot.val());
                peerConnection.addIceCandidate(candidate);
            });
            
        } catch(e) {
            console.error('Ошибка звонка:', e);
            alert('Не удалось начать звонок. Проверьте микрофон и камеру');
            endCall();
        }
    }
    
    async function answerCall(callId, fromUserId, isVideo) {
        if (isCallActive) return;
        
        currentCallId = callId;
        currentCallWith = fromUserId;
        
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: isVideo });
            
            peerConnection = new RTCPeerConnection(configuration);
            
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    db.ref(`calls/${callId}/candidates/${fromUserId}`).push(event.candidate.toJSON());
                }
            };
            
            peerConnection.ontrack = (event) => {
                const remoteVideo = document.getElementById('remoteVideo');
                if (remoteVideo && event.streams[0]) {
                    remoteVideo.srcObject = event.streams[0];
                }
            };
            
            const callSnap = await db.ref(`calls/${callId}`).once('value');
            const callData = callSnap.val();
            const offer = new RTCSessionDescription(callData.offer);
            
            await peerConnection.setRemoteDescription(offer);
            
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            
            await db.ref(`calls/${callId}/answer`).set({
                type: answer.type,
                sdp: answer.sdp
            });
            await db.ref(`calls/${callId}/status`).set('answered');
            
            db.ref(`calls/${callId}/candidates/${currentUser.id}`).on('child_added', (snapshot) => {
                const candidate = new RTCIceCandidate(snapshot.val());
                peerConnection.addIceCandidate(candidate);
            });
            
            startCallUI(fromUserId, isVideo);
            
        } catch(e) {
            console.error('Ошибка ответа:', e);
            alert('Не удалось ответить на звонок');
            endCall();
        }
    }
    
    function startCallUI(userId, isVideo) {
        isCallActive = true;
        
        const modal = document.createElement('div');
        modal.className = 'video-container';
        modal.id = 'videoCallContainer';
        modal.innerHTML = `
            <div class="remote-video">
                <video id="remoteVideo" autoplay playsinline></video>
            </div>
            <div class="local-video">
                <video id="localVideo" autoplay playsinline muted></video>
            </div>
            <div class="call-controls">
                <button class="call-control-btn" id="toggleAudioBtn" title="Микрофон">🎤</button>
                ${isVideo ? '<button class="call-control-btn" id="toggleVideoBtn" title="Камера">📹</button>' : ''}
                <button class="call-control-btn end-call" id="endCallBtn" title="Завершить">📞</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        const localVideo = document.getElementById('localVideo');
        if (localVideo) localVideo.srcObject = localStream;

            if (localStream) {
                const audioTrack = localStream.getAudioTracks()[0];
                audioTrack.enabled = !audioTrack.enabled;
                document.getElementById('toggleAudioBtn').textContent = audioTrack.enabled ? '🎤' : '🔇';
            }
        });
        
        document.getElementById('toggleVideoBtn')?.addEventListener('click', () => {
            if (localStream && isVideo) {
                const videoTrack = localStream.getVideoTracks()[0];
                videoTrack.enabled = !videoTrack.enabled;
                document.getElementById('toggleVideoBtn').textContent = videoTrack.enabled ? '📹' : '🚫📹';
            }
        });
        
        document.getElementById('endCallBtn')?.addEventListener('click', () => {
            endCall();
        });
        
        const waitingModal = document.querySelector('.call-modal');
        if (waitingModal) waitingModal.remove();
    }
    
    function showCallModal(userId, status, isVideo) {
        const modal = document.createElement('div');
        modal.className = 'call-modal';
        
        const contact = contacts.find(c => c.id === userId);
        const userName = contact ? contact.name : userId;
        
        if (status === 'waiting') {
            modal.innerHTML = `
                <div class="call-container">
                    <div class="call-avatar">📞</div>
                    <div class="call-name">${escapeHtml(userName)}</div>
                    <div class="call-status">⏳ Ожидание ответа...</div>
                    <div class="call-buttons">
                        <button class="call-btn-end" id="cancelCallBtn">📞 Отмена</button>
                    </div>
                </div>
            `;
            document.getElementById('cancelCallBtn')?.addEventListener('click', () => {
                endCall();
                modal.remove();
            });
        } else if (status === 'incoming') {
            // Уведомление о входящем звонке
            sendNotification('📞 Входящий звонок', `${userName} звонит вам...`);
            
            modal.innerHTML = `
                <div class="call-container">
                    <div class="call-avatar">📞</div>
                    <div class="call-name">${escapeHtml(userName)}</div>
                    <div class="call-status">📞 Входящий звонок...</div>
                    <div class="call-buttons">
                        <button class="call-btn-answer" id="answerCallBtn">📞 Ответить</button>
                        <button class="call-btn-end" id="rejectCallBtn">📞 Отклонить</button>
                    </div>
                </div>
            `;
            document.getElementById('answerCallBtn')?.addEventListener('click', () => {
                answerCall(currentCallId, userId, isVideo);
                modal.remove();
            });
            document.getElementById('rejectCallBtn')?.addEventListener('click', () => {
                if (currentCallId) {
                    db.ref(`calls/${currentCallId}/status`).set('rejected');
                }
                endCall();
                modal.remove();
            });
        }
        
        document.body.appendChild(modal);
    }
    
    function endCall() {
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        if (currentCallId) {
            db.ref(`calls/${currentCallId}/status`).set('ended');
            setTimeout(() => db.ref(`calls/${currentCallId}`).remove(), 2000);
        }
        
        const videoContainer = document.getElementById('videoCallContainer');
        if (videoContainer) videoContainer.remove();
        
        const callModal = document.querySelector('.call-modal');
        if (callModal) callModal.remove();
        
        isCallActive = false;
        currentCallId = null;
        currentCallWith = null;
    }
    
    function setupCallListener() {
        if (callListenerRef) callListenerRef.off();
        
        callListenerRef = db.ref('calls').orderByChild('to').equalTo(currentUser.id);
        callListenerRef.on('child_added', (snapshot) => {
            const call = snapshot.val();
            if (call && call.status === 'waiting' && !isCallActive) {
                currentCallId = snapshot.key;
                currentCallWith = call.from;
                showCallModal(call.from, 'incoming', call.isVideo);
            }
        });
    }

    async function userExists(uid) {

        return true;

    async function uploadImage(file) {
        if (!file || !storage) return null;
        try {
            const fileName = `images/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, '_')}`;
            const storageRef = storage.ref(fileName);
            await storageRef.put(file);
            return await storageRef.getDownloadURL();
        } catch(e) { return null; }
    }
    
    async function sendMessage() {
        const input = document.getElementById('messageInput');
        if (!input) return;
        const text = input.value.trim();
        if (!text || !activeChat) return;
        
        const message = {
            id: Date.now() + '_' + Math.random().toString(36).substr(2, 8),
            text: text,
            fromId: currentUser.id,
            fromName: currentUser.name,
            timestamp: Date.now(),
            timeStr: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
            type: 'text'
        };
        
        let path = activeChatType === 'user' ? `messages/${getDialogId(currentUser.id, activeChat)}` : 
                   activeChatType === 'group' ? `groupMessages/${activeChat}` : `channelMessages/${activeChat}`;
        
        try {
            await db.ref(path).push(message);
            input.value = '';
            autoResizeTextarea(input);
        } catch(e) { alert('Ошибка отправки'); }
    }
    
    async function sendImageMessage(imageUrl) {
        if (!activeChat) return;
        const message = {
            id: Date.now() + '_' + Math.random().toString(36).substr(2, 8),
            text: '',
            imageUrl: imageUrl,
            fromId: currentUser.id,
            fromName: currentUser.name,
            timestamp: Date.now(),
            timeStr: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
            type: 'image'
        };
        let path = activeChatType === 'user' ? `messages/${getDialogId(currentUser.id, activeChat)}` : 
                   activeChatType === 'group' ? `groupMessages/${activeChat}` : `channelMessages/${activeChat}`;
        await db.ref(path).push(message);

    async function attachImage() {
        if (!activeChat) { alert('Сначала выберите чат'); return; }
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (file) {
                const modal = document.createElement('div');
                modal.className = 'profile-modal';
                const previewUrl = URL.createObjectURL(file);
                modal.innerHTML = `
                    <div class="profile-card">
                        <h3>📸 Отправить изображение</h3>
                        <img src="${previewUrl}" style="max-width:100%; max-height:200px; border-radius:12px; margin:12px 0;">

    function autoResizeTextarea(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 100) + 'px';
    }
    
    function loadMessages() {
        if (currentMessagesRef) currentMessagesRef.off();
        if (!activeChat || !activeChatType) return;
        
        let path = activeChatType === 'user' ? `messages/${getDialogId(currentUser.id, activeChat)}` : 
                   activeChatType === 'group' ? `groupMessages/${activeChat}` : `channelMessages/${activeChat}`;
        
        const messagesRef = db.ref(path);
        currentMessagesRef = messagesRef;
        
        messagesRef.on('value', (snapshot) => {
            const messages = [];
            snapshot.forEach(child => { messages.push(child.val()); });
            messages.sort((a, b) => a.timestamp - b.timestamp);
            renderMessages(messages);
        });
        
        // Слушатель новых сообщений для уведомлений
        if (activeChatType === 'user') {
            messagesRef.limitToLast(1).on('child_added', (snapshot) => {
                const msg = snapshot.val();
                if (msg.fromId !== currentUser.id && !document.hasFocus()) {
                    const contact = contacts.find(c => c.id === activeChat);
                    if (contact) {
                        sendNotification(`💬 Новое сообщение от ${contact.name}`, msg.text || '📸 Фото');
                    }
                }
            });
        }
    }
    
    function renderMessages(messages) {
        const container = document.getElementById('messagesContainer');
        if (!container) return;
        if (!messages.length) { container.innerHTML = '<div class="empty-chat">💬 Напишите первое сообщение</div>'; return; }
        
        let html = '';
        for (const msg of messages) {
            const isOut = msg.fromId === currentUser.id;
            html += `
                <div class="message ${isOut ? 'out' : 'in'}">
                    <div class="message-sender">${escapeHtml(isOut ? 'Вы' : (msg.fromName || 'Пользователь'))}</div>
                    ${msg.type === 'image' && msg.imageUrl ? `<img src="${msg.imageUrl}" class="message-image" onclick="window.open('${msg.imageUrl}', '_blank')">` : `<div>${escapeHtml(msg.text || '')}</div>`}
                    <div class="message-time">${msg.timeStr}</div>
                </div>
            `;
        }
        container.innerHTML = html;
        setTimeout(() => { container.scrollTop = container.scrollHeight; }, 100);
    }
    
    async function loadContactsAndChats() {
        if (!currentUser) return;
        
        db.ref('messages').on('value', async (snapshot) => {
            const contactsMap = new Map();
            snapshot.forEach(dialog => {
                const parts = dialog.key.split('_');
                if (!parts.includes(currentUser.id)) return;
                contactsMap.set(parts[0] === currentUser.id ? parts[1] : parts[0], true);
            });
            const newContacts = [];
            for (const [cid] of contactsMap) {
                newContacts.push({ id: cid, name: await getUserName(cid), type: 'user' });
            }
            contacts = newContacts;
            renderAllChats();
        });
        
        db.ref(`userGroups/${currentUser.id}`).on('value', async (snapshot) => {
            groups = [];
            for (const groupId of Object.keys(snapshot.val() || {})) {
                const groupSnap = await db.ref(`groups/${groupId}`).once('value');
                if (groupSnap.exists()) groups.push({ ...groupSnap.val(), type: 'group' });
            }
            renderAllChats();
        });
        
        db.ref(`userChannels/${currentUser.id}`).on('value', async (snapshot) => {
            channels = [];
            for (const channelId of Object.keys(snapshot.val() || {})) {
                const channelSnap = await db.ref(`channels/${channelId}`).once('value');
                if (channelSnap.exists()) channels.push({ ...channelSnap.val(), type: 'channel' });
            }
            renderAllChats();
        });
    }
    
    function renderAllChats() {
        const container = document.getElementById('contactsList');
        if (!container) return;
        let html = '';
        if (currentTab === 'chats') {
            if (contacts.length > 0) {
                html += '<div class="section-title">💬 ЛИЧНЫЕ ЧАТЫ</div>';
                for (const contact of contacts) {
                    const isActive = activeChat === contact.id && activeChatType === 'user';
                    html += `
                        <div class="chat-item ${isActive ? 'active' : ''}" onclick="switchChat('${contact.id}', 'user')">
                            <div class="chat-avatar">${contact.name.charAt(0).toUpperCase()}</div>
                            <div class="chat-info">
                                <div class="chat-name">${escapeHtml(contact.name)}</div>
                                <div class="chat-type">ID: ${contact.id}</div>
                            </div>
                            <div class="call-btns">
                                <button class="call-btn" onclick="event.stopPropagation(); startCall('${contact.id}', true)" title="Видеозвонок">📹</button>
                                <button class="call-btn" onclick="event.stopPropagation(); startCall('${contact.id}', false)" title="Аудиозвонок">🎤</button>
                                <button class="delete-chat-btn" onclick="event.stopPropagation(); deleteContact('${contact.id}')">🗑️</button>
                            </div>
                        </div>
                    `;
                }
            }
            if (groups.length > 0) {
                html += '<div class="section-title">👥 ГРУППЫ</div>';
                for (const group of groups) {
                    const isActive = activeChat === group.id && activeChatType === 'group';
                    html += `<div class="chat-item ${isActive ? 'active' : ''}" onclick="switchChat('${group.id}', 'group')"><div class="chat-avatar">👥</div><div class="chat-info"><div class="chat-name">${escapeHtml(group.name)}</div><div class="chat-type">Группа</div></div></div>`;
                }
            }
            if (channels.length > 0) {
                html += '<div class="section-title">📢 КАНАЛЫ</div>';
                for (const channel of channels) {
                    const isActive = activeChat === channel.id && activeChatType === 'channel';
                    html += `<div class="chat-item ${isActive ? 'active' : ''}" onclick="switchChat('${channel.id}', 'channel')"><div class="chat-avatar">📢</div><div class="chat-info"><div class="chat-name">${escapeHtml(channel.name)}</div><div class="chat-type">Канал</div></div></div>`;
                }
            }
            if (contacts.length === 0 && groups.length === 0 && channels.length === 0) {
                html = '<div class="empty-contacts">✨ Нет чатов. Начните общение или создайте группу/канал</div>';
            }
        }
        container.innerHTML = html;
    }
    
    async function deleteContact(contactId) {
        if (confirm('Удалить этот контакт?')) {
            contacts = contacts.filter(c => c.id !== contactId);
            if (activeChat === contactId && activeChatType === 'user') {
                activeChat = null;
                activeChatType = null;
                document.getElementById('messagesContainer').innerHTML = '<div class="empty-chat">💬 Выберите чат</div>';
                document.getElementById('messageInput').disabled = true;
                document.getElementById('sendBtn').disabled = true;
                document.getElementById('attachBtn').disabled = true;
            }
            renderAllChats();
        }
    }
    
    window.switchChat = async function(chatId, type) {
        if (!chatId) return;
        let name = '';
        if (type === 'user') {
            let contact = contacts.find(c => c.id === chatId);
            if (!contact) {
                if (await userExists(chatId)) {
                    contact = { id: chatId, name: await getUserName(chatId), type: 'user' };
                    contacts.push(contact);
                } else { alert('Пользователь не найден'); return; }
            }
            name = contact.name;
        } else if (type === 'group') {
            const group = groups.find(g => g.id === chatId);
            if (!group) return;
            name = group.name;
        } else if (type === 'channel') {
            const channel = channels.find(c => c.id === chatId);
            if (!channel) return;
            name = channel.name;
        }
        
        activeChat = chatId;
        activeChatType = type;
        localStorage.setItem('glory_activeChat', JSON.stringify({ id: chatId, type }));
        renderAllChats();
        
        const header = document.getElementById('chatHeader');
        if (header) {
            const typeIcon = type === 'user' ? '💬' : type === 'group' ? '👥' : '📢';
            header.innerHTML = `<button class="back-btn" id="backBtn">←</button><div class="chat-info-header"><div class="chat-name-header">${typeIcon} ${escapeHtml(name)}</div><div class="chat-desc">${type === 'user' ? 'Личный чат' : type === 'group' ? 'Группа' : 'Канал'}</div></div>`;
            document.getElementById('backBtn')?.addEventListener('click', () => {
                document.querySelector('.contacts-panel').classList.remove('hide');
                document.querySelector('.chat-panel').classList.remove('show');
            });
        }
        
        loadMessages();
        
        const input = document.getElementById('messageInput');
        if (input) { input.disabled = false; input.placeholder = `Сообщение в ${name}...`; input.focus(); }
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('attachBtn').disabled = false;
        
        if (window.innerWidth <= 768) {
            document.querySelector('.contacts-panel').classList.add('hide');
            document.querySelector('.chat-panel').classList.add('show');
        }
    };
    
    async function searchAndAddUser() {
        const input = document.getElementById('searchInput');
        const feedback = document.getElementById('searchFeedback');
        const val = input.value.trim();
        if (!val) { feedback.textContent = '❌ Введите ID'; return; }
        if (val === currentUser.id) { feedback.textContent = '❌ Нельзя добавить себя'; return; }
        feedback.textContent = '🔍 Поиск...';
        const exists = await userExists(val);
        if (!exists) { feedback.textContent = `❌ Пользователь ${val} не найден`; return; }
        const name = await getUserName(val);
        if (!contacts.find(c => c.id === val)) contacts.push({ id: val, name, type: 'user' });
        feedback.textContent = `✅ ${name} добавлен!`;
        await switchChat(val, 'user');
        setTab('chats');
        input.value = '';
        setTimeout(() => feedback.textContent = '', 2000);
    }
    
    async function createGroup(name, description) {
        const groupId = generateChatId();
        await db.ref(`groups/${groupId}`).set({ id: groupId, name, description, creator: currentUser.id, members: [currentUser.id] });
        await db.ref(`userGroups/${currentUser.id}/${groupId}`).set(true);
        return groupId;
    }
    
    async function createChannel(name, description) {
        const channelId = generateChatId();
        await db.ref(`channels/${channelId}`).set({ id: channelId, name, description, creator: currentUser.id, members: [currentUser.id] });
        await db.ref(`userChannels/${currentUser.id}/${channelId}`).set(true);
        return channelId;
    }
    
    async function joinGroup(groupId) {
        const group = await db.ref(`groups/${groupId}`).once('value');
        if (group.exists()) {
            await db.ref(`userGroups/${currentUser.id}/${groupId}`).set(true);
            return true;
        }
        return false;
    }
    
    async function joinChannel(channelId) {
        const channel = await db.ref(`channels/${channelId}`).once('value');
        if (channel.exists()) {
            await db.ref(`userChannels/${currentUser.id}/${channelId}`).set(true);
            return true;
        }
        return false;
    }
    
    function logout() {
        if (currentMessagesRef) currentMessagesRef.off();
        if (callListenerRef) callListenerRef.off();
        if (isCallActive) endCall();
        localStorage.clear();
        currentUser = null;
        showLogin();
    }
    
    function setTab(tab) {
        currentTab = tab;
        const tabContent = document.getElementById('tabContent');
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
        if (tab === 'chats') {
            tabContent.innerHTML = '<div class="contacts-list" id="contactsList"></div>';
            renderAllChats();
        } else {
            tabContent.innerHTML = `
                <div class="search-section"><div class="search-title">🔍 НАЙТИ ПОЛЬЗОВАТЕЛЯ</div><div class="search-box"><input type="text" id="searchInput" placeholder="Введите ID"><button id="searchBtn">Найти</button></div><div class="search-feedback" id="searchFeedback"></div></div>
                <div class="search-section"><button class="create-btn" id="createGroupBtn">+ Создать группу</button></div>
                <div class="search-section"><button class="create-btn" id="createChannelBtn">+ Создать канал</button></div>
                <div class="search-section"><button class="create-btn" id="joinGroupBtn">🔗 Вступить в группу по ID</button></div>
                <div class="search-section"><button class="create-btn" id="joinChannelBtn">🔗 Подписаться на канал по ID</button></div>
                <div class="search-section" id="notificationStatus">
                    <div class="notification-permission" onclick="requestNotificationPermission()">🔔 Включить уведомления</div>
                </div>
                <div class="search-section" id="installBtn" style="display: none;">
                    <button class="install-btn" onclick="installPWA()">📲 Установить приложение</button>
                </div>
            `;
            document.getElementById('searchBtn')?.addEventListener('click', searchAndAddUser);
            document.getElementById('createGroupBtn')?.addEventListener('click', () => showCreateModal('group'));
            document.getElementById('createChannelBtn')?.addEventListener('click', () => showCreateModal('channel'));
            document.getElementById('joinGroupBtn')?.addEventListener('click', () => showJoinModal('group'));
            document.getElementById('joinChannelBtn')?.addEventListener('click', () => showJoinModal('channel'));
        }
    }
    
    function showCreateModal(type) {
        const modal = document.createElement('div');
        modal.className = 'profile-modal';
        modal.innerHTML = `<div class="profile-card"><h3>${type === 'group' ? 'Создать группу' : 'Создать канал'}</h3><input type="text" id="createName" placeholder="Название"><input type="text" id="createDesc" placeholder="Описание"><div class="profile-buttons"><button class="btn-primary" id="confirmCreate">Создать</button><button class="btn-close" id="cancelCreate">Отмена</button></div></div>`;
        document.body.appendChild(modal);
        document.getElementById('confirmCreate').onclick = async () => {
            const name = document.getElementById('createName').value.trim();
            if (!name) { alert('Введите название'); return; }
            const desc = document.getElementById('createDesc').value.trim();
            if (type === 'group') await createGroup(name, desc);
            else await createChannel(name, desc);
            modal.remove();
            alert(`✅ ${type === 'group' ? 'Группа' : 'Канал'} "${name}" создан!`);
        };
        document.getElementById('cancelCreate').onclick = () => modal.remove();
    }
    
    function showJoinModal(type) {
        const modal = document.createElement('div');
        modal.className = 'profile-modal';
        modal.innerHTML = `<div class="profile-card"><h3>${type === 'group' ? 'Вступить в группу' : 'Подписаться на канал'}</h3><input type="text" id="joinId" placeholder="ID"><div class="profile-buttons"><button class="btn-primary" id="confirmJoin">${type === 'group' ? 'Вступить' : 'Подписаться'}</button><button class="btn-close" id="cancelJoin">Отмена</button></div></div>`;
        document.body.appendChild(modal);
        document.getElementById('confirmJoin').onclick = async () => {
            const id = document.getElementById('joinId').value.trim();
            if (!id) { alert('Введите ID'); return; }
            const success = type === 'group' ? await joinGroup(id) : await joinChannel(id);
            if (success) { modal.remove(); alert(`✅ ${type === 'group' ? 'Вы вступили в группу!' : 'Вы подписались на канал!'}`); }
            else alert(`❌ ${type === 'group' ? 'Группа' : 'Канал'} не найден`);
        };
        document.getElementById('cancelJoin').onclick = () => modal.remove();
    }
    
    function showLogin() {
        root.innerHTML = `
            <div class="login-screen"><div class="login-card"><h1>GLORY</h1><p>Мессенджер со звонками и уведомлениями 📞🔔</p>
            <div class="login-tabs"><div class="login-tab active" data-tab="new" onclick="setLoginTab('new')">🆕 Новый ID</div><div class="login-tab" data-tab="existing" onclick="setLoginTab('existing')">🔑 Войти по ID</div></div>
            <div id="newIdSection"><input type="text" id="loginName" placeholder="Ваше имя"><div class="id-row"><input type="text" id="loginId" readonly><button id="genIdBtn">🔄</button></div><button class="login-btn" id="loginBtn">Создать аккаунт</button></div>
            <div id="existingIdSection" style="display: none;"><input type="text" id="existingIdInput" placeholder="Ваш ID"><input type="text" id="existingNameInput" placeholder="Ваше имя"><button class="login-btn" id="loginExistingBtn">Войти</button></div></div></div>
        `;
        const idInput = document.getElementById('loginId');
        idInput.value = generateId();
        document.getElementById('genIdBtn').onclick = () => idInput.value = generateId();
        document.getElementById('loginBtn').onclick = async () => {
            const name = document.getElementById('loginName').value.trim();
            const uid = idInput.value.trim();
            if (!name) { alert('Введите имя'); return; }
            if (await userExists(uid)) { alert(`ID ${uid} занят`); idInput.value = generateId(); return; }
            await registerUser(uid, name);
            currentUser = { id: uid, name };
            localStorage.setItem('gloryUser', JSON.stringify(currentUser));
            showMessenger();
        };
        document.getElementById('loginExistingBtn').onclick = async () => {
            const uid = document.getElementById('existingIdInput').value.trim();
            const name = document.getElementById('existingNameInput').value.trim();
            if (!uid || !name) { alert('Введите ID и имя'); return; }
            const exists = await userExists(uid);
            if (!exists) { alert('❌ Пользователь не найден'); return; }
            const userSnap = await db.ref(`users/${uid}`).once('value');
            if (userSnap.val().name !== name) { alert('❌ Неверное имя'); return; }
            currentUser = { id: uid, name };
            localStorage.setItem('gloryUser', JSON.stringify(currentUser));
            showMessenger();
        };
        window.setLoginTab = (tab) => {
            document.querySelectorAll('.login-tab').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
            document.getElementById('newIdSection').style.display = tab === 'new' ? 'block' : 'none';
            document.getElementById('existingIdSection').style.display = tab === 'existing' ? 'block' : 'none';
        };
    }
    
    function showMessenger() {
        const savedTheme = localStorage.getItem('glory_theme') || 'dark';
        document.body.className = savedTheme + '-theme';
        
        root.innerHTML = `
            <div class="app">
                <div class="contacts-panel">
                    <div class="contacts-header">
                        <div class="user-card">
                            <div class="user-avatar" id="userAvatar">${currentUser.name.charAt(0).toUpperCase()}</div>
                            <div class="user-info"><div class="user-name">${escapeHtml(currentUser.name)}</div><div class="user-id">ID: ${currentUser.id}</div></div>
                        </div>
                        <div class="theme-selector">
                            <div class="theme-option dark" data-theme="dark" onclick="setTheme('dark')">🌙 Тёмная</div>
                            <div class="theme-option light" data-theme="light" onclick="setTheme('light')">☀️ Светлая</div>
                            <div class="theme-option blue" data-theme="blue" onclick="setTheme('blue')">🔵 Синяя</div>
                            <div class="theme-option green" data-theme="green" onclick="setTheme('green')">🟢 Зелёная</div>
                            <div class="theme-option purple" data-theme="purple" onclick="setTheme('purple')">🟣 Фиолетовая</div>
                        </div>
                        <button class="logout-btn" id="logoutBtn">🚪 Выйти из аккаунта</button>
                    </div>
                    <div class="tabs"><button class="tab-btn active" data-tab="chats" onclick="setTab('chats')">💬 Чаты</button><button class="tab-btn" data-tab="search" onclick="setTab('search')">🔍 Поиск</button></div>
                    <div id="tabContent"><div class="contacts-list" id="contactsList"></div></div>
                </div>
                <div class="chat-panel">
                    <div class="chat-header" id="chatHeader"><button class="back-btn" id="backBtn">←</button><div class="chat-info-header"><div class="chat-name-header">GLORY</div><div class="chat-desc">Выберите чат</div></div></div>
                    <div class="messages" id="messagesContainer"><div class="empty-chat">💬 Выберите чат</div></div>
                    <div class="input-area">
                        <button class="attach-btn" id="attachBtn" disabled>📎</button>
                        <textarea class="msg-input" id="messageInput" placeholder="Сообщение..." disabled rows="1"></textarea>
                        <button class="send-btn" id="sendBtn" disabled>📩</button>
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
        document.getElementById('sendBtn')?.addEventListener('click', sendMessage);
        document.getElementById('attachBtn')?.addEventListener('click', attachImage);
        
        const input = document.getElementById('messageInput');
        input?.addEventListener('keypress', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
        input?.addEventListener('input', function() { autoResizeTextarea(this); });
        
        window.setTab = setTab;
        window.setTheme = setTheme;
        window.deleteContact = deleteContact;
        window.switchChat = switchChat;
        window.startCall = startCall;
        window.endCall = endCall;
        window.requestNotificationPermission = requestNotificationPermission;
        window.installPWA = installPWA;
        
        loadContactsAndChats();
        setTab('chats');
        setupCallListener();
        
        // Запрос разрешения на уведомления через 2 секунды
        setTimeout(() => {
            if (Notification.permission === 'default') {
                requestNotificationPermission();
            }
        }, 2000);
        
        const savedChat = localStorage.getItem('glory_activeChat');
        if (savedChat) {
            try {
                const { id, type } = JSON.parse(savedChat);
                setTimeout(() => switchChat(id, type), 500);
            } catch(e) {}
        }
        
        document.querySelectorAll('.theme-option').forEach(opt => {
            if (opt.dataset.theme === savedTheme) opt.classList.add('active');
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    const savedUser = localStorage.getItem('gloryUser');
    if (savedUser && db) {
        try {
            currentUser = JSON.parse(savedUser);
            showMessenger();
        } catch(e) { showLogin(); }
    } else { showLogin(); }
</script>
</body>
</html>
