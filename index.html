<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLORY | Мессенджер с уведомлениями</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-primary);
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111;
            --bg-tertiary: #0c0c0c;
            --bg-card: #1a1a1a;
            --bg-input: #1a1a1a;
            --border-color: #222;
            --text-primary: #fff;
            --text-secondary: #888;
            --text-muted: #666;
            --accent-color: #7c4dff;
            --message-out: #7c4dff;
            --message-in: #1a1a1a;
            --success: #4caf50;
            --danger: #ff5e5e;
            --unread-badge: #ff4444;
        }
        
        body.light-theme {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f0f0f0;
            --bg-card: #ffffff;
            --bg-input: #f5f5f5;
            --border-color: #e0e0e0;
            --text-primary: #1a1a1a;
            --text-secondary: #666;
            --message-in: #e9ecef;
        }

        .app {
            display: flex;
            height: 100vh;
            width: 100%;
            background: var(--bg-primary);
            overflow: hidden;
        }

        .menu-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: transform 0.3s ease;
            overflow-y: auto;
        }
        
        .menu-screen.hide {
            transform: translateX(-100%);
        }
        
        .menu-card {
            background: var(--bg-secondary);
            border-radius: 48px;
            padding: 40px;
            width: 85%;
            max-width: 350px;
            text-align: center;
            margin: 20px 0;
        }
        
        .cake-3d-container {
            width: 220px;
            height: 220px;
            margin: 0 auto 20px;
            cursor: pointer;
        }
        
        .menu-btn {
            padding: 16px;
            border-radius: 40px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            background: var(--accent-color);
            color: white;
            width: 100%;
            margin-bottom: 12px;
        }
        
        .menu-btn.secondary {
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        
        .contacts-panel {
            width: 320px;
            background: var(--bg-secondary);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            height: 100%;
            flex-shrink: 0;
            transform: translateX(0);
            transition: transform 0.3s ease;
        }
        
        .contacts-panel.hide {
            transform: translateX(-100%);
        }
        
        .contacts-header {
            padding: 20px 16px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }
        
        .close-contacts-btn {
            position: absolute;
            top: 20px;
            right: 16px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            color: var(--text-secondary);
        }
        
        .user-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            margin-bottom: 16px;
        }
        
        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 600;
            color: white;
        }
        
        .user-info {
            flex: 1;
        }
        
        .user-name {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        
        .user-id-hidden {
            font-family: monospace;
            font-size: 0.65rem;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px 8px;
            background: var(--bg-input);
            border-radius: 20px;
            display: inline-block;
        }
        
        .theme-selector {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        
        .theme-option {
            flex: 1;
            padding: 8px 4px;
            border-radius: 30px;
            cursor: pointer;
            text-align: center;
            font-size: 0.7rem;
            background: var(--bg-input);
            color: var(--text-primary);
            border: 2px solid transparent;
        }
        
        .theme-option.active {
            border-color: var(--accent-color);
            background: var(--accent-color);
            color: white;
        }
        
        .exit-contacts-btn, .logout-btn {
            width: 100%;
            padding: 14px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 12px;
            border: none;
        }
        
        .exit-contacts-btn {
            background: var(--bg-input);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }
        
        .logout-btn {
            background: linear-gradient(135deg, var(--danger), #ff3e3e);
            color: white;
        }
        
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-tertiary);
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85rem;
        }
        
        .tab-btn.active {
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
        }
        
        .search-section {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .search-title {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        
        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .search-box input {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            color: var(--text-primary);
            outline: none;
        }
        
        .search-box button, .create-btn {
            background: var(--accent-color);
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .create-btn {
            background: var(--bg-input);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            width: 100%;
            margin-top: 8px;
        }
        
        .contacts-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        
        .section-title {
            padding: 8px 12px;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        
        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 2px;
            position: relative;
        }
        
        .chat-item.active {
            background: var(--accent-color);
        }
        
        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent-color);
            color: white;
            font-size: 1.2rem;
        }
        
        .chat-info {
            flex: 1;
        }
        
        .chat-name {
            font-weight: 500;
            color: var(--text-primary);
        }
        
        .chat-id-hidden {
            font-size: 0.65rem;
            color: var(--text-secondary);
            cursor: pointer;
            display: inline-block;
            padding: 2px 6px;
            background: var(--bg-input);
            border-radius: 12px;
        }
        
        .unread-badge {
            background: var(--unread-badge);
            color: white;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 0.7rem;
            font-weight: bold;
            min-width: 20px;
            text-align: center;
        }
        
        .delete-chat-btn {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 1rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }
        
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            height: 100%;
            overflow: hidden;
        }
        
        .chat-panel.hide {
            display: none;
        }
        
        .chat-header {
            padding: 16px 20px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .back-to-contacts-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-primary);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 20px;
            word-wrap: break-word;
        }
        
        .message.out {
            background: var(--message-out);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        
        .message.in {
            background: var(--message-in);
            color: var(--text-primary);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        
        .message-sender {
            font-size: 0.6rem;
            margin-bottom: 4px;
            opacity: 0.7;
        }
        
        .message-time {
            font-size: 0.5rem;
            opacity: 0.5;
            margin-top: 4px;
            text-align: right;
        }
        
        .input-area {
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .attach-btn {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text-secondary);
        }
        
        .msg-input {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            font-size: 0.95rem;
            color: var(--text-primary);
            outline: none;
            resize: none;
            max-height: 100px;
        }
        
        .send-btn {
            background: var(--accent-color);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
        }
        
        .id-modal {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            padding: 12px 24px;
            border-radius: 40px;
            color: var(--text-primary);
            font-family: monospace;
            z-index: 2000;
            animation: fadeOut 2s ease forwards;
        }
        
        .notification-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--accent-color);
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            z-index: 1500;
            animation: slideIn 0.3s ease, fadeOut 2s ease 1.7s forwards;
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes fadeOut {
            0%, 70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: var(--bg-primary);
            padding: 20px;
        }
        
        .login-card {
            background: var(--bg-secondary);
            border-radius: 32px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
        }
        
        .login-card h1 {
            color: var(--accent-color);
            font-size: 2rem;
            margin-bottom: 8px;
        }
        
        .login-card input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            color: var(--text-primary);
            margin-bottom: 16px;
        }
        
        .id-row {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        
        .id-row input {
            flex: 1;
            margin-bottom: 0;
        }
        
        .id-row button {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px 20px;
            border-radius: 16px;
            cursor: pointer;
        }
        
        .login-btn {
            background: linear-gradient(135deg, var(--accent-color), #6a3dff);
            border: none;
            color: white;
            width: 100%;
            padding: 14px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .login-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .login-tab {
            flex: 1;
            padding: 10px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            cursor: pointer;
            text-align: center;
            color: var(--text-secondary);
        }
        
        .login-tab.active {
            background: linear-gradient(135deg, var(--accent-color), #6a3dff);
            color: white;
        }
        
        .password-hint {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: -12px;
            margin-bottom: 16px;
            text-align: left;
        }
        
        .profile-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .profile-card {
            background: var(--bg-secondary);
            border-radius: 32px;
            padding: 32px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        
        .profile-card input {
            width: 100%;
            padding: 12px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            margin-bottom: 12px;
        }
        
        .profile-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        
        .btn-primary {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 30px;
            cursor: pointer;
            flex: 1;
        }
        
        .btn-close {
            background: var(--bg-input);
            color: var(--text-secondary);
            border: none;
            padding: 12px;
            border-radius: 30px;
            cursor: pointer;
            flex: 1;
        }
        
        @media (max-width: 768px) {
            .contacts-panel, .chat-panel {
                position: fixed;
                left: 0;
                top: 0;
                width: 100%;
                height: 100%;
                z-index: 10;
            }
            .chat-panel { z-index: 20; }
            .message { max-width: 85%; }
            .notification-toast { top: 10px; right: 10px; left: 10px; text-align: center; }
        }
    </style>

<script type="module">
    import * as THREE from 'three';
    window.THREE = THREE;
    
    window.initDetailedCake = function(containerId) {
        const container = document.getElementById(containerId);
        if (!container) {
            console.log('Container not found:', containerId);
            return null;
        }
        
        const width = container.clientWidth || 220;
        const height = container.clientHeight || 220;
        const scene = new THREE.Scene();
        scene.background = null;
        
        const camera = new THREE.PerspectiveCamera(45, width/height, 0.1, 1000);
        camera.position.set(0, 1.5, 4.5);
        camera.lookAt(0, 1.2, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(width, height);
        renderer.setClearColor(0x000000, 0);
        container.innerHTML = '';
        container.appendChild(renderer.domElement);
        
        // Освещение
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xfff5e6, 1);
        mainLight.position.set(2, 3, 2);
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(0xffaa88, 0.5);
        fillLight.position.set(1, 2, 2);
        scene.add(fillLight);
        
        // Нижний ярус
        const bottomCake = new THREE.Mesh(
            new THREE.CylinderGeometry(1.3, 1.3, 0.45, 48),
            new THREE.MeshStandardMaterial({ color: 0xd4a373, roughness: 0.2 })
        );
        bottomCake.position.y = 0.225;
        scene.add(bottomCake);
        
        const bottomIcing = new THREE.Mesh(
            new THREE.CylinderGeometry(1.35, 1.35, 0.12, 48),
            new THREE.MeshStandardMaterial({ color: 0xf8e8d0 })
        );
        bottomIcing.position.y = 0.45;
        scene.add(bottomIcing);
        
        // Средний ярус
        const middleCake = new THREE.Mesh(
            new THREE.CylinderGeometry(1.0, 1.0, 0.4, 48),
            new THREE.MeshStandardMaterial({ color: 0xb5835a })
        );
        middleCake.position.y = 0.75;
        scene.add(middleCake);
        
        const middleIcing = new THREE.Mesh(
            new THREE.CylinderGeometry(1.05, 1.05, 0.1, 48),
            new THREE.MeshStandardMaterial({ color: 0xf8e8d0 })
        );
        middleIcing.position.y = 0.95;
        scene.add(middleIcing);
        
        // Верхний ярус
        const topCake = new THREE.Mesh(
            new THREE.CylinderGeometry(0.7, 0.7, 0.38, 48),
            new THREE.MeshStandardMaterial({ color: 0x9c6e42 })
        );
        topCake.position.y = 1.2;
        scene.add(topCake);
        
        const topIcing = new THREE.Mesh(
            new THREE.CylinderGeometry(0.75, 0.75, 0.1, 48),
            new THREE.MeshStandardMaterial({ color: 0xf8e8d0 })
        );
        topIcing.position.y = 1.4;
        scene.add(topIcing);
        
        // Свечи
        const candlePositions = [-0.35, 0, 0.35];
        candlePositions.forEach((x, idx) => {
            const candle = new THREE.Mesh(
                new THREE.CylinderGeometry(0.09, 0.1, 0.45, 12),
                new THREE.MeshStandardMaterial({ color: idx === 1 ? 0xffaa66 : 0xff6b6b })
            );
            candle.position.set(x, 1.65, 0);
            scene.add(candle);
            
            const flame = new THREE.Mesh(
                new THREE.ConeGeometry(0.07, 0.15, 8),
                new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0xff4400, emissiveIntensity: 0.6 })
            );
            flame.position.set(x, 1.88, 0);
            scene.add(flame);
        });
        
        // Ягоды
        const berryMat = new THREE.MeshStandardMaterial({ color: 0xdd2244 });
        for (let i = 0; i < 8; i++) {
            const berry = new THREE.Mesh(new THREE.SphereGeometry(0.07, 8, 8), berryMat);
            const angle = (i / 8) * Math.PI * 2;
            berry.position.set(Math.cos(angle) * 0.55, 1.48, Math.sin(angle) * 0.55);
            scene.add(berry);
        }
        
        // Конфетти
        const confMat = new THREE.MeshStandardMaterial({ color: 0xffaa88 });
        for (let i = 0; i < 60; i++) {
            const particle = new THREE.Mesh(new THREE.SphereGeometry(0.03, 4, 4), confMat);
            particle.position.set((Math.random() - 0.5) * 2.2, Math.random() * 1.8, (Math.random() - 0.5) * 1.8);
            scene.add(particle);
        }
        
        let angle = 0;
        function animate() {
            requestAnimationFrame(animate);
            angle += 0.008;
            scene.rotation.y = angle;
            renderer.render(scene, camera);
        }
        animate();
        
        return { scene, camera, renderer };
    };
</script>

    let groups = [];
    let channels = [];
    let currentMessagesRef = null;
    let currentTab = 'chats';
    let unreadCounts = {};
    let lastReadTimes = {};
    
    const root = document.getElementById('root');
    
    function showNotification(title, body) {
        if (Notification.permission === 'granted') {
            new Notification(title, { body: body, icon: '🎂' });
        }
        const toast = document.createElement('div');
        toast.className = 'notification-toast';
        toast.innerHTML = `<strong>${title}</strong><br>${body}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }
    
    async function requestNotificationPermission() {
        if ('Notification' in window && Notification.permission !== 'granted' && Notification.permission !== 'denied') {
            await Notification.requestPermission();
        }
    }
    
    function hashPassword(pwd) {
        let hash = 0;
        for (let i = 0; i < pwd.length; i++) {
            hash = ((hash << 5) - hash) + pwd.charCodeAt(i);
            hash = hash & hash;
        }
        return hash.toString(16);
    }
    
    function isValidPassword(pwd) {
        return /^\d{6}$/.test(pwd);
    }
    
    function generateId() {
        return Math.floor(100000 + Math.random() * 900000).toString();
    }
    
    function generateChatId() {
        return Date.now().toString(36) + Math.random().toString(36).substr(2, 6);
    }
    
    function getDialogId(uid1, uid2) {
        return [uid1, uid2].sort().join('_');
    }
    
    function getPathForChat(chatId, type) {
        if (type === 'user') return `messages/${getDialogId(currentUser.id, chatId)}`;
        if (type === 'group') return `groupMessages/${chatId}`;
        return `channelMessages/${chatId}`;
    }
    
    async function userExists(uid) {
        const snap = await db.ref(`users/${uid}`).once('value');
        return snap.exists();
    }
    
    async function registerUser(uid, name, password) {
        await db.ref(`users/${uid}`).set({
            id: uid, name, password: hashPassword(password),
            createdAt: Date.now()
        });
        return true;
    }
    
    async function verifyUser(uid, name, password) {
        const snap = await db.ref(`users/${uid}`).once('value');
        if (!snap.exists()) return false;
        const data = snap.val();
        if (data.name !== name) return false;
        if (!data.password || data.password === '') return true;
        return data.password === hashPassword(password);
    }
    
    async function getUserName(uid) {
        const snap = await db.ref(`users/${uid}/name`).once('value');
        return snap.val() || uid;
    }
    
    // Группы
    async function createGroup(name, description) {
        const groupId = generateChatId();
        await db.ref(`groups/${groupId}`).set({
            id: groupId, name, description, creator: currentUser.id, members: [currentUser.id], createdAt: Date.now()
        });
        await db.ref(`userGroups/${currentUser.id}/${groupId}`).set(true);
        return groupId;
    }
    
    async function createChannel(name, description) {
        const channelId = generateChatId();
        await db.ref(`channels/${channelId}`).set({
            id: channelId, name, description, creator: currentUser.id, members: [currentUser.id], createdAt: Date.now()
        });
        await db.ref(`userChannels/${currentUser.id}/${channelId}`).set(true);
        return channelId;
    }
    
    async function joinGroup(groupId) {
        const group = await db.ref(`groups/${groupId}`).once('value');
        if (group.exists()) {
            const members = group.val().members || [];
            if (!members.includes(currentUser.id)) {
                members.push(currentUser.id);
                await db.ref(`groups/${groupId}/members`).set(members);
            }
            await db.ref(`userGroups/${currentUser.id}/${groupId}`).set(true);
            return true;
        }
        return false;
    }
    
    async function joinChannel(channelId) {
        const channel = await db.ref(`channels/${channelId}`).once('value');
        if (channel.exists()) {
            const members = channel.val().members || [];
            if (!members.includes(currentUser.id)) {
                members.push(currentUser.id);
                await db.ref(`channels/${channelId}/members`).set(members);
            }
            await db.ref(`userChannels/${currentUser.id}/${channelId}`).set(true);
            return true;
        }
        return false;
    }
    
    async function sendMessage() {
        const input = document.getElementById('messageInput');
        if (!input || !input.value.trim() || !activeChat || !activeChatType) {
            console.log("Cannot send: no input or no active chat");
            return;
        }
        
        const message = {
            id: Date.now() + '_' + Math.random().toString(36).substr(2, 8),
            text: input.value.trim(),
            fromId: currentUser.id,
            fromName: currentUser.name,
            timestamp: Date.now(),
            timeStr: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
            type: 'text'
        };
        
        const path = getPathForChat(activeChat, activeChatType);
        console.log("Sending to path:", path);
        
        try {
            await db.ref(path).push(message);
            input.value = '';
            input.style.height = 'auto';
            
            // Обновляем время последнего прочитанного
            const key = `${activeChatType}_${activeChat}`;
            lastReadTimes[key] = Date.now();
            localStorage.setItem('glory_lastRead', JSON.stringify(lastReadTimes));
            unreadCounts[key] = 0;
            renderAllChats();
        } catch(e) {
            console.error("Send error:", e);
            alert("Ошибка отправки: " + e.message);
        }
    }
    
    function markChatAsRead(chatId, type) {
        const key = `${type}_${chatId}`;
        lastReadTimes[key] = Date.now();
        unreadCounts[key] = 0;
        localStorage.setItem('glory_lastRead', JSON.stringify(lastReadTimes));
        renderAllChats();
    }
    
    function showIdPopup(id) {
        const popup = document.createElement('div');
        popup.className = 'id-modal';
        popup.textContent = `🆔 ${id}`;
        document.body.appendChild(popup);
        setTimeout(() => popup.remove(), 2000);
    }
    
    function showMenu() {
        const menuScreen = document.querySelector('.menu-screen');
        const contactsPanel = document.querySelector('.contacts-panel');
        const chatPanel = document.querySelector('.chat-panel');
        if (menuScreen) menuScreen.classList.remove('hide');
        if (contactsPanel) contactsPanel.classList.add('hide');
        if (chatPanel) chatPanel.classList.add('hide');
    }
    
    function showContacts() {
        const menuScreen = document.querySelector('.menu-screen');
        const contactsPanel = document.querySelector('.contacts-panel');
        const chatPanel = document.querySelector('.chat-panel');
        if (menuScreen) menuScreen.classList.add('hide');
        if (contactsPanel) contactsPanel.classList.remove('hide');
        if (chatPanel) chatPanel.classList.add('hide');
    }
    
    function showChat() {
        const contactsPanel = document.querySelector('.contacts-panel');
        const chatPanel = document.querySelector('.chat-panel');
        if (contactsPanel) contactsPanel.classList.add('hide');
        if (chatPanel) chatPanel.classList.remove('hide');
    }
    
    function setTheme(theme) {
        document.body.className = theme + '-theme';
        localStorage.setItem('glory_theme', theme);
        document.querySelectorAll('.theme-option').forEach(opt => {
            if (opt.dataset.theme === theme) {
                opt.classList.add('active');
            } else {
                opt.classList.remove('active');
            }
        });
    }
    
    function loadMessages() {
        if (currentMessagesRef) currentMessagesRef.off();
        if (!activeChat || !activeChatType) return;
        
        const path = getPathForChat(activeChat, activeChatType);
        console.log("Loading messages from:", path);
        currentMessagesRef = db.ref(path);
        
        currentMessagesRef.on('value', (snapshot) => {
            const messages = [];
            snapshot.forEach(child => messages.push({ key: child.key, ...child.val() }));
            messages.sort((a,b) => a.timestamp - b.timestamp);
            
            const container = document.getElementById('messagesContainer');
            if (!container) return;
            
            if (messages.length === 0) {
                container.innerHTML = '<div class="empty-chat">💬 Напишите первое сообщение</div>';
                return;
            }
            
            let html = '';
            for (const msg of messages) {
                const isOut = msg.fromId === currentUser.id;
                html += `
                    <div class="message ${isOut ? 'out' : 'in'}">
                        ${activeChatType !== 'user' ? `<div class="message-sender">${escapeHtml(msg.fromName)}</div>` : ''}
                        <div>${escapeHtml(msg.text || '')}</div>
                        <div class="message-time">${msg.timeStr}</div>
                    </div>
                `;
            }
            container.innerHTML = html;
            setTimeout(() => container.scrollTop = container.scrollHeight, 100);
        });
        
        // Помечаем чат как прочитанный
        markChatAsRead(activeChat, activeChatType);
    }
    
    async function loadAllChats() {
        if (!currentUser) return;
        
        // Загружаем сохраненные времена последнего прочтения
        const saved = localStorage.getItem('glory_lastRead');
        if (saved) {
            try {
                lastReadTimes = JSON.parse(saved);
            } catch(e) {}
        }
        
        // Функция для отслеживания новых сообщений
        const watchMessages = (path, chatId, type, name) => {
            const key = `${type}_${chatId}`;
            db.ref(path).on('child_added', (snapshot) => {
                const msg = snapshot.val();
                if (msg.fromId !== currentUser.id && msg.timestamp > (lastReadTimes[key] || 0)) {
                    unreadCounts[key] = (unreadCounts[key] || 0) + 1;
                    renderAllChats();
                    if (activeChat !== chatId && document.querySelector('.contacts-panel:not(.hide)')) {
                        showNotification(`📩 ${name}`, msg.text?.substring(0, 50) || 'новое сообщение');
                    }
                }
            });
        };
        
        // Личные чаты
        db.ref('messages').on('value', async (snapshot) => {
            const contactsMap = new Map();
            snapshot.forEach(dialog => {
                const parts = dialog.key.split('_');
                if (parts.length === 2 && parts.includes(currentUser.id)) {
                    const otherId = parts[0] === currentUser.id ? parts[1] : parts[0];
                    contactsMap.set(otherId, true);
                }
            });
            contacts = [];
            for (const cid of contactsMap.keys()) {
                const name = await getUserName(cid);
                contacts.push({ id: cid, name: name, type: 'user' });
                const path = `messages/${getDialogId(currentUser.id, cid)}`;
                watchMessages(path, cid, 'user', name);
            }
            renderAllChats();
        });
        
        // Группы
        db.ref(`userGroups/${currentUser.id}`).on('value', async (snapshot) => {
            groups = [];
            const groupIds = snapshot.val() || {};
            for (const groupId of Object.keys(groupIds)) {
                const groupSnap = await db.ref(`groups/${groupId}`).once('value');
                if (groupSnap.exists()) {
                    const group = groupSnap.val();
                    groups.push({ id: groupId, name: group.name, type: 'group' });
                    const path = `groupMessages/${groupId}`;
                    watchMessages(path, groupId, 'group', group.name);
                }
            }
            renderAllChats();
        });
        
        // Каналы
        db.ref(`userChannels/${currentUser.id}`).on('value', async (snapshot) => {
            channels = [];
            const channelIds = snapshot.val() || {};
            for (const channelId of Object.keys(channelIds)) {
                const channelSnap = await db.ref(`channels/${channelId}`).once('value');
                if (channelSnap.exists()) {
                    const channel = channelSnap.val();
                    channels.push({ id: channelId, name: channel.name, type: 'channel' });
                    const path = `channelMessages/${channelId}`;
                    watchMessages(path, channelId, 'channel', channel.name);
                }
            }
            renderAllChats();
        });
    }
    
    function renderAllChats() {
        const container = document.getElementById('contactsList');
        if (!container) return;
        
        let html = '';
        if (currentTab === 'chats') {
            // Личные чаты
            if (contacts.length > 0) {
                html += '<div class="section-title">💬 ЛИЧНЫЕ ЧАТЫ</div>';
                for (const contact of contacts) {
                    const isActive = (activeChat === contact.id && activeChatType === 'user');
                    const key = `user_${contact.id}`;
                    const unread = unreadCounts[key] || 0;
                    html += `
                        <div class="chat-item ${isActive ? 'active' : ''}" onclick="selectContact('${contact.id}', 'user')">
                            <div class="chat-avatar">${escapeHtml(contact.name.charAt(0).toUpperCase())}</div>
                            <div class="chat-info">
                                <div class="chat-name">${escapeHtml(contact.name)}</div>
                                <div class="chat-id-hidden" onclick="event.stopPropagation(); showIdPopup('${contact.id}')">🆔 ID</div>
                            </div>
                            ${unread > 0 ? `<div class="unread-badge">${unread}</div>` : ''}
                            <button class="delete-chat-btn" onclick="event.stopPropagation(); deleteContact('${contact.id}')">🗑️</button>
                        </div>
                    `;
                }
            }
            
            // Группы
            if (groups.length > 0) {
                html += '<div class="section-title">👥 ГРУППЫ</div>';
                for (const group of groups) {
                    const isActive = (activeChat === group.id && activeChatType === 'group');
                    const key = `group_${group.id}`;
                    const unread = unreadCounts[key] || 0;
                    html += `
                        <div class="chat-item ${isActive ? 'active' : ''}" onclick="selectContact('${group.id}', 'group')">
                            <div class="chat-avatar">👥</div>
                            <div class="chat-info">
                                <div class="chat-name">${escapeHtml(group.name)}</div>
                                <div class="chat-id-hidden" onclick="event.stopPropagation(); showIdPopup('${group.id}')">🆔 ID</div>
                            </div>
                            ${unread > 0 ? `<div class="unread-badge">${unread}</div>` : ''}
                        </div>
                    `;
                }
            }
            
            // Каналы
            if (channels.length > 0) {
                html += '<div class="section-title">📢 КАНАЛЫ</div>';
                for (const channel of channels) {
                    const isActive = (activeChat === channel.id && activeChatType === 'channel');
                    const key = `channel_${channel.id}`;
                    const unread = unreadCounts[key] || 0;
                    html += `
                        <div class="chat-item ${isActive ? 'active' : ''}" onclick="selectContact('${channel.id}', 'channel')">
                            <div class="chat-avatar">📢</div>
                            <div class="chat-info">
                                <div class="chat-name">${escapeHtml(channel.name)}</div>
                                <div class="chat-id-hidden" onclick="event.stopPropagation(); showIdPopup('${channel.id}')">🆔 ID</div>
                            </div>
                            ${unread > 0 ? `<div class="unread-badge">${unread}</div>` : ''}
                        </div>
                    `;
                }
            }
            
            if (contacts.length === 0 && groups.length === 0 && channels.length === 0) {
                html = '<div class="empty-contacts">✨ Нет чатов. Найдите друзей по ID или создайте группу/канал</div>';
            }
        }
        container.innerHTML = html;
    }
    
    window.selectContact = async function(chatId, type) {
        if (!chatId) return;
        
        let name = '';
        if (type === 'user') {
            let contact = contacts.find(c => c.id === chatId);
            if (!contact && await userExists(chatId)) {
                contact = { id: chatId, name: await getUserName(chatId) };
                contacts.push(contact);
            }
            name = contact?.name || chatId;
        } else if (type === 'group') {
            const group = groups.find(g => g.id === chatId);
            name = group?.name || chatId;
        } else if (type === 'channel') {
            const channel = channels.find(c => c.id === chatId);
            name = channel?.name || chatId;
        }
        
        activeChat = chatId;
        activeChatType = type;
        localStorage.setItem('glory_activeChat', JSON.stringify({ id: chatId, type }));
        
        const header = document.getElementById('chatHeader');
        if (header) {
            const typeIcon = type === 'user' ? '💬' : (type === 'group' ? '👥' : '📢');
            header.innerHTML = `
                <button class="back-to-contacts-btn" id="backToContactsBtn">✕</button>
                <div class="chat-info-header" onclick="showIdPopup('${chatId}')">
                    <div class="chat-name-header">${typeIcon} ${escapeHtml(name)}</div>
                </div>
            `;
            const backBtn = document.getElementById('backToContactsBtn');
            if (backBtn) backBtn.onclick = () => showContacts();
        }
        
        // Помечаем как прочитанное
        markChatAsRead(chatId, type);
        
        loadMessages();
        showChat();
        const msgInput = document.getElementById('messageInput');
        if (msgInput) {
            msgInput.disabled = false;
            msgInput.focus();
        }
        const sendBtn = document.getElementById('sendBtn');
        const attachBtn = document.getElementById('attachBtn');
        if (sendBtn) sendBtn.disabled = false;
        if (attachBtn) attachBtn.disabled = false;
    };
    
    async function deleteContact(contactId) {
        if (confirm('Удалить этот контакт?')) {
            contacts = contacts.filter(c => c.id !== contactId);
            if (activeChat === contactId && activeChatType === 'user') {
                activeChat = null;
                activeChatType = null;
                const container = document.getElementById('messagesContainer');
                if (container) container.innerHTML = '<div class="empty-chat">💬 Выберите чат</div>';
                showContacts();
            }
            renderAllChats();
        }
    }
    
    async function searchAndAddUser() {
        const input = document.getElementById('searchInput');
        const feedback = document.getElementById('searchFeedback');
        const val = input.value.trim();
        if (!val) {
            feedback.textContent = '❌ Введите ID';
            return;
        }
        if (val === currentUser.id) {
            feedback.textContent = '❌ Нельзя добавить себя';
            return;
        }
        feedback.textContent = '🔍 Поиск...';
        const exists = await userExists(val);
        if (!exists) {
            feedback.textContent = `❌ Пользователь ${val} не найден`;
            return;
        }
        const name = await getUserName(val);
        if (!contacts.find(c => c.id === val)) {
            contacts.push({ id: val, name: name, type: 'user' });
        }
        feedback.textContent = `✅ ${name} добавлен!`;
        renderAllChats();
        input.value = '';
        setTimeout(() => {
            if (feedback) feedback.textContent = '';
        }, 2000);
    }
    
    function showCreateModal(type) {
        const modal = document.createElement('div');
        modal.className = 'profile-modal';
        modal.innerHTML = `
            <div class="profile-card">
                <h3 style="color:var(--text-primary); margin-bottom:16px;">${type === 'group' ? 'Создать группу' : 'Создать канал'}</h3>
                <input type="text" id="createName" placeholder="Название">
                <input type="text" id="createDesc" placeholder="Описание">
                <div class="profile-buttons">
                    <button class="btn-primary" id="confirmCreate">Создать</button>
                    <button class="btn-close" id="cancelCreate">Отмена</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        document.getElementById('confirmCreate').onclick = async () => {
            const name = document.getElementById('createName').value.trim();
            if (!name) {
                alert('Введите название');
                return;
            }
            const desc = document.getElementById('createDesc').value.trim();
            if (type === 'group') {
                await createGroup(name, desc);
                alert(`✅ Группа "${name}" создана!`);
            } else {
                await createChannel(name, desc);
                alert(`✅ Канал "${name}" создан!`);
            }
            modal.remove();
        };
        document.getElementById('cancelCreate').onclick = () => modal.remove();
    }
    
    function showJoinModal(type) {
        const modal = document.createElement('div');
        modal.className = 'profile-modal';
        modal.innerHTML = `
            <div class="profile-card">
                <h3 style="color:var(--text-primary); margin-bottom:16px;">${type === 'group' ? 'Вступить в группу' : 'Подписаться на канал'}</h3>
                <input type="text" id="joinId" placeholder="Введите ID">
                <div class="profile-buttons">
                    <button class="btn-primary" id="confirmJoin">${type === 'group' ? 'Вступить' : 'Подписаться'}</button>
                    <button class="btn-close" id="cancelJoin">Отмена</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        document.getElementById('confirmJoin').onclick = async () => {
            const id = document.getElementById('joinId').value.trim();
            if (!id) {
                alert('Введите ID');
                return;
            }
            const success = type === 'group' ? await joinGroup(id) : await joinChannel(id);
            if (success) {
                alert(`✅ ${type === 'group' ? 'Вы вступили в группу!' : 'Вы подписались на канал!'}`);
                modal.remove();
            } else {
                alert(`❌ ${type === 'group' ? 'Группа' : 'Канал'} не найден`);
            }
        };
        document.getElementById('cancelJoin').onclick = () => modal.remove();
    }
    
    function setTab(tab) {
        currentTab = tab;
        const tabBtns = document.querySelectorAll('.tab-btn');
        tabBtns.forEach(btn => {
            if (btn.dataset.tab === tab) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        
        const tabContent = document.getElementById('tabContent');
        if (!tabContent) return;
        
        if (tab === 'chats') {
            tabContent.innerHTML = '<div class="contacts-list" id="contactsList"></div>';
            renderAllChats();
        } else {
            tabContent.innerHTML = `
                <div class="search-section">
                    <div class="search-title">🔍 НАЙТИ ПОЛЬЗОВАТЕЛЯ</div>
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Введите ID пользователя">
                        <button id="searchBtn">Найти</button>
                    </div>
                    <div class="search-feedback" id="searchFeedback"></div>
                </div>
                <div class="search-section">
                    <button class="create-btn" id="createGroupBtn">👥 + Создать группу</button>
                </div>
                <div class="search-section">
                    <button class="create-btn" id="createChannelBtn">📢 + Создать канал</button>
                </div>
                <div class="search-section">
                    <button class="create-btn" id="joinGroupBtn">🔗 Вступить в группу по ID</button>
                </div>
                <div class="search-section">
                    <button class="create-btn" id="joinChannelBtn">🔗 Подписаться на канал по ID</button>
                </div>
            `;
            
            document.getElementById('searchBtn').onclick = searchAndAddUser;
            document.getElementById('createGroupBtn').onclick = () => showCreateModal('group');
            document.getElementById('createChannelBtn').onclick = () => showCreateModal('channel');
            document.getElementById('joinGroupBtn').onclick = () => showJoinModal('group');
            document.getElementById('joinChannelBtn').onclick = () => showJoinModal('channel');
        }
    }
    
    function showLogin() {
        root.innerHTML = `
            <div class="login-screen">
                <div class="login-card">
                    <h1>GLORY</h1>
                    <p>Мессенджер с уведомлениями 🔔</p>
                    <div class="login-tabs">
                        <div class="login-tab active" data-tab="new" onclick="setLoginTab('new')">🆕 Регистрация</div>

                    </div>
                    <div id="newIdSection">

                        <div class="id-row">
                            <input type="text" id="loginId" readonly>
                            <button id="genIdBtn">🔄</button>
                        </div>
                        <input type="password" id="loginPassword" placeholder="Пароль (6 цифр)" maxlength="6">
                        <div class="password-hint">🔒 6-значный цифровой пароль</div>
                        <button class="login-btn" id="loginBtn">Создать аккаунт</button>
                    </div>
                    <div id="existingIdSection" style="display:none;">
                        <input type="text" id="existingIdInput" placeholder="Ваш ID">
                        <input type="text" id="existingNameInput" placeholder="Ваше имя">
                        <input type="password" id="existingPasswordInput" placeholder="Пароль (6 цифр)" maxlength="6">
                        <button class="login-btn" id="loginExistingBtn">Войти</button>
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById('loginId').value = generateId();
        document.getElementById('genIdBtn').onclick = () => {
            document.getElementById('loginId').value = generateId();
        };
        
        document.getElementById('loginBtn').onclick = async () => {
            const name = document.getElementById('loginName').value.trim();
            const uid = document.getElementById('loginId').value.trim();
            const pwd = document.getElementById('loginPassword').value;
            if (!name) { alert('Введите имя'); return; }
            if (!isValidPassword(pwd)) { alert('Пароль должен быть 6 цифр'); return; }
            if (await userExists(uid)) { alert('ID занят'); document.getElementById('loginId').value = generateId(); return; }
            await registerUser(uid, name, pwd);
            currentUser = { id: uid, name };
            localStorage.setItem('gloryUser', JSON.stringify(currentUser));
            await requestNotificationPermission();
            showMessenger();
        };
        
        document.getElementById('loginExistingBtn').onclick = async () => {
            const uid = document.getElementById('existingIdInput').value.trim();
            const name = document.getElementById('existingNameInput').value.trim();
            const pwd = document.getElementById('existingPasswordInput').value;
            if (!uid || !name) { alert('Введите ID и имя'); return; }
            if (await verifyUser(uid, name, pwd)) {
                currentUser = { id: uid, name };
                localStorage.setItem('gloryUser', JSON.stringify(currentUser));
                await requestNotificationPermission();
                showMessenger();
            } else alert('❌ Неверные данные');
        };
        
        window.setLoginTab = (tab) => {
            document.querySelectorAll('.login-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
            document.getElementById('newIdSection').style.display = tab === 'new' ? 'block' : 'none';
            document.getElementById('existingIdSection').style.display = tab === 'existing' ? 'block' : 'none';
        };
    }
    
    async function showMessenger() {
        const savedTheme = localStorage.getItem('glory_theme') || 'dark';
        document.body.className = savedTheme + '-theme';
        
        root.innerHTML = `
            <div class="app">
                <div class="menu-screen">
                    <div class="menu-card">
                        <div class="menu-logo">✨</div>
                        <div class="menu-title">GLORY</div>
                        <div class="menu-subtitle">Мессенджер с уведомлениями 🔔</div>
                        <div id="cake3dMain" class="cake-3d-container" style="width:220px; height:220px; margin:0 auto 20px;"></div>
                        <div class="menu-buttons">
                            <button class="menu-btn" id="startBtn">🚀 Начать общение</button>
                            <button class="menu-btn secondary" id="profileBtn">👤 Мой профиль</button>
                        </div>
                        <p style="font-size:0.7rem; margin-top:20px; color:var(--text-muted);">🎂 С выпуском 28.03.26!<br>От разработчика с любовью ❤️</p>
                    </div>
                </div>
                <div class="contacts-panel hide">
                    <div class="contacts-header">
                        <button class="close-contacts-btn" id="closeContactsBtn">✕</button>
                        <div class="user-card" id="profileCard">
                            <div class="user-avatar">${escapeHtml(currentUser.name.charAt(0).toUpperCase())}</div>
                            <div class="user-info">
                                <div class="user-name">${escapeHtml(currentUser.name)}</div>
                                <div class="user-id-hidden" id="showMyIdBtn">🆔 показать ID</div>
                            </div>
                        </div>
                        <div class="theme-selector">
                            <div class="theme-option dark" data-theme="dark" onclick="setTheme('dark')">🌙 Тёмная</div>
                            <div class="theme-option light" data-theme="light" onclick="setTheme('light')">☀️ Светлая</div>
                        </div>
                        <button class="exit-contacts-btn" id="exitContactsBtn">🏠 Выйти в меню</button>
                        <button class="logout-btn" id="logoutBtn">🚪 Выйти</button>
                    </div>
                    <div class="tabs">
                        <button class="tab-btn active" data-tab="chats" onclick="setTab('chats')">💬 Чаты</button>
                        <button class="tab-btn" data-tab="search" onclick="setTab('search')">🔍 Поиск</button>
                    </div>
                    <div id="tabContent">
                        <div class="contacts-list" id="contactsList"></div>
                    </div>
                </div>
                <div class="chat-panel hide">
                    <div class="chat-header" id="chatHeader">
                        <button class="back-to-contacts-btn" id="backToContactsBtn">✕</button>
                        <div class="chat-info-header"><div class="chat-name-header">GLORY</div></div>
                    </div>
                    <div class="messages" id="messagesContainer"><div class="empty-chat">💬 Выберите чат</div></div>
                    <div class="input-area">
                        <button class="attach-btn" id="attachBtn" disabled>📎</button>
                        <textarea class="msg-input" id="messageInput" placeholder="Сообщение..." disabled rows="1"></textarea>
                        <button class="send-btn" id="sendBtn" disabled>📩</button>
                    </div>
                </div>
            </div>
        `;
        
        // Инициализация 3D торта
        setTimeout(() => {
            if (window.initDetailedCake) {
                window.initDetailedCake('cake3dMain');
            }
        }, 100);
        
        document.getElementById('startBtn').onclick = () => showContacts();
        document.getElementById('profileBtn').onclick = () => showIdPopup(currentUser.id);
        document.getElementById('showMyIdBtn').onclick = () => showIdPopup(currentUser.id);
        document.getElementById('profileCard').onclick = () => showIdPopup(currentUser.id);
        document.getElementById('exitContactsBtn').onclick = () => showMenu();
        document.getElementById('closeContactsBtn').onclick = () => showMenu();
        document.getElementById('logoutBtn').onclick = () => { localStorage.clear(); location.reload(); };
        document.getElementById('sendBtn').onclick = () => sendMessage();
        document.getElementById('attachBtn').onclick = () => alert('📎 Прикрепление фото (в разработке)');
        
        const msgInput = document.getElementById('messageInput');
        if (msgInput) {
            msgInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            msgInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 100) + 'px';
            });
        }
        
        window.setTab = setTab;
        window.setTheme = setTheme;
        window.deleteContact = deleteContact;
        window.selectContact = selectContact;
        window.showIdPopup = showIdPopup;
        
        await loadAllChats();
        setTab('chats');
        showMenu();
        
        const savedChat = localStorage.getItem('glory_activeChat');
        if (savedChat) {
            try {
                const { id, type } = JSON.parse(savedChat);
                setTimeout(() => selectContact(id, type), 500);
            } catch(e) {}
        }
        
        document.querySelectorAll('.theme-option').forEach(opt => {
            if (opt.dataset.theme === savedTheme) opt.classList.add('active');
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    const savedUser = localStorage.getItem('gloryUser');
    if (savedUser && db) {
        try {
            currentUser = JSON.parse(savedUser);
            showMessenger();
        } catch(e) { showLogin(); }
    } else {
        showLogin();
    }
</script>
</body>
</html>
