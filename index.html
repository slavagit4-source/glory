<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLORY | Мессенджер</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-primary);
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111;
            --bg-tertiary: #0c0c0c;
            --bg-card: #1a1a1a;
            --bg-input: #1a1a1a;
            --border-color: #222;
            --text-primary: #fff;
            --text-secondary: #888;
            --text-muted: #666;
            --accent-color: #7c4dff;
            --message-out: #7c4dff;
            --message-in: #1a1a1a;
            --success: #4caf50;
            --danger: #ff5e5e;
            --online: #4caf50;
            --offline: #666;
        }
        
        body.light-theme {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f0f0f0;
            --bg-card: #ffffff;
            --bg-input: #f5f5f5;
            --border-color: #e0e0e0;
            --text-primary: #1a1a1a;
            --text-secondary: #666;
            --message-in: #e9ecef;
        }
        
        body.blue-theme {
            --bg-primary: #0a1929;
            --bg-secondary: #0c1c2e;
            --bg-tertiary: #0a1a2a;
            --bg-card: #0f2a3a;
            --accent-color: #2196f3;
            --message-out: #2196f3;
            --message-in: #1e3a5f;
        }
        
        body.green-theme {
            --bg-primary: #0a2a1a;
            --bg-secondary: #0c2a1a;
            --bg-tertiary: #0a2a18;
            --bg-card: #1a3a2a;
            --accent-color: #4caf50;
            --message-out: #4caf50;
            --message-in: #2a5a3a;
        }
        
        body.purple-theme {
            --bg-primary: #1a0a2a;
            --bg-secondary: #1a0a2a;
            --bg-tertiary: #180a24;
            --bg-card: #2a1a3a;
            --accent-color: #9c27b0;
            --message-out: #9c27b0;
            --message-in: #4a2a6a;
        }

        .app {
            display: flex;
            height: 100vh;
            width: 100%;
            background: var(--bg-primary);
            overflow: hidden;
        }

        /* Панель контактов */
        .contacts-panel {
            width: 320px;
            background: var(--bg-secondary);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            height: 100%;
            flex-shrink: 0;
            transform: translateX(0);
            transition: transform 0.3s ease;
        }
        .contacts-panel.hide {
            transform: translateX(-100%);
        }

        .contacts-header {
            padding: 20px 16px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
        }

        .user-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            margin-bottom: 16px;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
            overflow: hidden;
        }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .user-info { flex: 1; }
        .user-name { font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
        .view-profile-btn { font-size: 0.65rem; color: var(--accent-color); cursor: pointer; display: inline-block; padding: 4px 8px; background: var(--bg-input); border-radius: 20px; }

        .theme-selector { display: flex; gap: 8px; justify-content: space-between; margin-bottom: 12px; }
        .theme-option { flex: 1; padding: 8px 4px; border-radius: 30px; cursor: pointer; text-align: center; font-size: 0.7rem; font-weight: 500; border: 2px solid transparent; background: var(--bg-input); color: var(--text-primary); }
        .theme-option.active { border-color: var(--accent-color); background: var(--accent-color); color: white; }

        .exit-contacts-btn { background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-secondary); padding: 12px 16px; border-radius: 30px; cursor: pointer; width: 100%; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 12px; }
        .logout-btn { background: linear-gradient(135deg, var(--danger), #ff3e3e); border: none; color: white; padding: 14px 16px; border-radius: 30px; cursor: pointer; width: 100%; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px; }

        .tabs { display: flex; border-bottom: 1px solid var(--border-color); background: var(--bg-tertiary); }
        .tab-btn { flex: 1; padding: 12px; background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 0.85rem; }
        .tab-btn.active { color: var(--accent-color); border-bottom: 2px solid var(--accent-color); }

        .search-section { padding: 16px; border-bottom: 1px solid var(--border-color); }
        .search-title { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; }
        .search-box { display: flex; gap: 8px; }
        .search-box input { flex: 1; padding: 10px 14px; background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 12px; color: var(--text-primary); outline: none; }
        .search-box button, .create-btn { background: var(--accent-color); border: none; color: white; padding: 10px 18px; border-radius: 12px; cursor: pointer; }
        .create-btn { background: var(--bg-input); color: var(--text-secondary); width: 100%; margin-top: 8px; }

        .contacts-list { flex: 1; overflow-y: auto; padding: 8px; }
        .section-title { padding: 8px 12px; font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 2px;
        }
        .chat-item.active { background: var(--accent-color); }
        .chat-avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: 600; color: white; flex-shrink: 0; background: var(--accent-color); }
        .chat-info { flex: 1; }
        .chat-name { font-weight: 500; color: var(--text-primary); }
        .view-contact-profile { font-size: 0.6rem; color: var(--accent-color); cursor: pointer; display: inline-block; margin-top: 2px; }
        .call-btns { display: flex; gap: 5px; }
        .call-btn { background: var(--success); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; }
        .delete-chat-btn { background: none; border: none; color: var(--danger); cursor: pointer; padding: 8px; font-size: 1rem; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* Чат панель */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            height: 100%;
            overflow: hidden;
            transform: translateX(0);
            transition: transform 0.3s ease;
        }
        .chat-panel.hide { transform: translateX(100%); }

        .chat-header {
            padding: 16px 20px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .back-to-contacts-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-primary); width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .chat-info-header { flex: 1; cursor: pointer; }
        .chat-name-header { font-weight: 600; color: var(--text-primary); font-size: 1rem; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .view-profile-in-chat { font-size: 0.6rem; color: var(--accent-color); background: var(--bg-input); padding: 4px 8px; border-radius: 20px; cursor: pointer; }

        /* Сообщения - правильная прокрутка */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 8px;
        }

        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 20px;
            word-wrap: break-word;
        }
        .message.out { background: var(--message-out); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .message.in { background: var(--message-in); color: var(--text-primary); align-self: flex-start; border-bottom-left-radius: 4px; }
        .message-image { max-width: 200px; max-height: 200px; border-radius: 12px; cursor: pointer; }
        .message-sender { font-size: 0.6rem; margin-bottom: 4px; opacity: 0.7; }
        .message-time { font-size: 0.5rem; opacity: 0.5; margin-top: 4px; text-align: right; }

        .input-area {
            padding: 10px 12px;
            background: var(--bg-tertiary);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
            align-items: flex-end;
            flex-shrink: 0;
        }
        .attach-btn { background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 50%; width: 44px; height: 44px; font-size: 1.2rem; cursor: pointer; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .msg-input { flex: 1; padding: 12px 16px; background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 24px; font-size: 0.95rem; color: var(--text-primary); outline: none; resize: none; max-height: 100px; font-family: inherit; line-height: 1.4; }
        .msg-input:focus { border-color: var(--accent-color); }
        .send-btn { background: var(--accent-color); border: none; color: white; width: 44px; height: 44px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .empty-chat, .empty-contacts { text-align: center; color: var(--text-secondary); padding: 40px; }

        /* Модалка профиля */
        .profile-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .profile-card {
            background: var(--bg-secondary);
            border-radius: 32px;
            padding: 32px;
            width: 85%;
            max-width: 350px;
            text-align: center;
        }
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; background: var(--accent-color); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 600; color: white; margin: 0 auto 20px; overflow: hidden; cursor: pointer; position: relative; }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-name { font-size: 1.5rem; font-weight: 600; color: var(--text-primary); margin-bottom: 8px; }
        .profile-id { font-family: monospace; font-size: 0.9rem; color: var(--accent-color); background: var(--bg-input); padding: 8px 16px; border-radius: 30px; display: inline-block; margin-bottom: 16px; }
        .profile-status { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; margin-bottom: 20px; }
        .profile-status.online { background: var(--online); color: white; }
        .profile-status.offline { background: var(--offline); color: white; }
        .profile-buttons { display: flex; gap: 12px; margin-top: 16px; flex-direction: column; }
        .profile-buttons button { width: 100%; padding: 12px; border-radius: 30px; border: none; cursor: pointer; font-weight: 500; font-size: 1rem; }
        .btn-primary { background: var(--accent-color); color: white; }
        .btn-close { background: var(--bg-input); color: var(--text-secondary); border: 1px solid var(--border-color); }

        @media (max-width: 768px) {
            .contacts-panel { position: fixed; left: 0; top: 0; width: 100%; height: 100%; z-index: 10; }
            .chat-panel { position: fixed; left: 0; top: 0; width: 100%; height: 100%; z-index: 20; }
            .message { max-width: 85%; }
            .call-btn, .delete-chat-btn { width: 44px; height: 44px; }
            .input-area { padding: 8px 12px; padding-bottom: max(8px, env(safe-area-inset-bottom)); }
        }

        .login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; background: var(--bg-primary); }
        .login-card { background: var(--bg-secondary); border-radius: 32px; padding: 40px; width: 90%; max-width: 400px; }
        .login-card h1 { color: var(--accent-color); font-size: 2rem; }
        .login-card input { width: 100%; padding: 12px 16px; background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 16px; color: var(--text-primary); margin-bottom: 16px; }
        .id-row { display: flex; gap: 10px; margin-bottom: 16px; }
        .id-row input { flex: 1; margin-bottom: 0; }
        .id-row button { background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-primary); padding: 12px 20px; border-radius: 16px; cursor: pointer; }
        .login-btn { background: linear-gradient(135deg, var(--accent-color), #6a3dff); border: none; color: white; width: 100%; padding: 14px; border-radius: 30px; font-weight: 600; cursor: pointer; }
        .login-tabs { display: flex; gap: 12px; margin-bottom: 20px; }
        .login-tab { flex: 1; padding: 10px; background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 30px; cursor: pointer; text-align: center; color: var(--text-secondary); }
        .login-tab.active { background: linear-gradient(135deg, var(--accent-color), #6a3dff); color: white; }
    </style>
</head>
<body>
<div id="root"></div>

<script>
    const FIREBASE_CONFIG = {
        apiKey: "AIzaSyDxRMLwUU96rFAtuCdLizHisx9UxIyyNlM",
        authDomain: "my-messenger-a7ad1.firebaseapp.com",
        projectId: "my-messenger-a7ad1",
        storageBucket: "my-messenger-a7ad1.firebasestorage.app",
        messagingSenderId: "27711084677",
        appId: "1:27711084677:web:5f2bc2cb684008e89531ec"
    };

    let db = null;
    let storage = null;
    
    try {
        firebase.initializeApp(FIREBASE_CONFIG);
        db = firebase.database();
        storage = firebase.storage();
        console.log('✅ Firebase готов');
    } catch(e) {
        console.error('Firebase error:', e);
    }

    let currentUser = null;
    let activeChat = null;
    let activeChatType = null;
    let contacts = [];
    let groups = [];
    let channels = [];
    let currentMessagesRef = null;
    let currentTab = 'chats';
    
    const root = document.getElementById('root');
    
    // Функция прокрутки вниз
    function scrollToBottom() {
        const messagesArea = document.getElementById('messagesArea');
        if (messagesArea) {
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
    }
    
    // Показ контактов сразу
    function showContacts() {
        const contacts = document.querySelector('.contacts-panel');
        const chat = document.querySelector('.chat-panel');
        if (contacts) contacts.classList.remove('hide');
        if (chat) chat.classList.add('hide');
    }
    
    function showChat() {
        const contacts = document.querySelector('.contacts-panel');
        const chat = document.querySelector('.chat-panel');
        if (contacts) contacts.classList.add('hide');
        if (chat) chat.classList.remove('hide');
        setTimeout(scrollToBottom, 100);
    }
    
    // Показ профиля
    async function showProfile(userId, isOwn = false) {
        const userSnap = await db.ref(`users/${userId}`).once('value');
        const user = userSnap.val();
        if (!user) return;
        
        const status = await getUserStatus(userId);
        const avatarUrl = user.avatar;
        
        const modal = document.createElement('div');
        modal.className = 'profile-modal';
        
        modal.innerHTML = `
            <div class="profile-card">
                <div class="profile-avatar" ${isOwn ? 'onclick="changeAvatar()"' : ''}>
                    ${avatarUrl ? `<img src="${avatarUrl}">` : user.name.charAt(0).toUpperCase()}
                    ${isOwn ? '<div style="position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,0.6); font-size:0.6rem; padding:2px;">📷</div>' : ''}
                </div>
                <div class="profile-name">${escapeHtml(user.name)}</div>
                <div class="profile-id">🆔 ${userId}</div>
                <div class="profile-status ${status === 'online' ? 'online' : 'offline'}">
                    ${status === 'online' ? '🟢 Онлайн' : '⚫ Офлайн'}
                </div>
                <div class="profile-buttons">
                    ${isOwn ? '<button class="btn-primary" id="editNameBtn">✏️ Редактировать имя</button>' : ''}
                    <button class="btn-close" id="closeProfileBtn">🔙 Закрыть</button>
                </div>
            </div>
        `;
        
        document.body.appendChild(modal);
        
        if (isOwn) {
            const editBtn = document.getElementById('editNameBtn');
            if (editBtn) {
                editBtn.onclick = async () => {
                    const newName = prompt('Введите новое имя:', user.name);
                    if (newName && newName.trim()) {
                        await db.ref(`users/${userId}/name`).set(newName);
                        currentUser.name = newName;
                        localStorage.setItem('gloryUser', JSON.stringify(currentUser));
                        const userNameSpan = document.getElementById('userNameSpan');
                        if (userNameSpan) userNameSpan.textContent = newName;
                        renderAllChats();
                        modal.remove();
                        showProfile(userId, true);
                    }
                };
            }
        }
        
        const closeBtn = document.getElementById('closeProfileBtn');
        if (closeBtn) {
            closeBtn.onclick = () => modal.remove();
        }
    }
    
    async function changeAvatar() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (file) {
                const fileName = `avatars/${currentUser.id}_${Date.now()}.jpg`;
                const storageRef = storage.ref(fileName);
                await storageRef.put(file);
                const url = await storageRef.getDownloadURL();
                await db.ref(`users/${currentUser.id}/avatar`).set(url);
                alert('✅ Аватарка обновлена!');
                const modal = document.querySelector('.profile-modal');
                if (modal) modal.remove();
                showProfile(currentUser.id, true);
                renderAllChats();
            }
        };
        input.click();
    }
    
    // Основные функции
    function setTheme(theme) {
        document.body.className = theme + '-theme';
        localStorage.setItem('glory_theme', theme);
        document.querySelectorAll('.theme-option').forEach(opt => {
            if (opt.dataset.theme === theme) {
                opt.classList.add('active');
            } else {
                opt.classList.remove('active');
            }
        });
    }
    
    function generateId() {
        return Math.floor(100000 + Math.random() * 900000).toString();
    }
    
    function generateChatId() {
        return Date.now().toString(36) + Math.random().toString(36).substr(2, 6);
    }
    
    async function userExists(uid) {
        if (!db) return false;
        const snap = await db.ref(`users/${uid}`).once('value');
        return snap.exists();
    }
    
    async function registerUser(uid, name) {
        if (!db) return false;
        await db.ref(`users/${uid}`).set({ id: uid, name: name, createdAt: Date.now(), status: 'online' });
        return true;
    }
    
    async function getUserName(uid) {
        if (!db) return uid;
        const snap = await db.ref(`users/${uid}/name`).once('value');
        return snap.val() || uid;
    }
    
    async function getUserStatus(uid) {
        if (!db) return 'offline';
        const snap = await db.ref(`users/${uid}/status`).once('value');
        return snap.val() || 'offline';
    }
    
    function getDialogId(uid1, uid2) {
        return [uid1, uid2].sort().join('_');
    }
    
    async function sendMessage() {
        const input = document.getElementById('messageInput');
        if (!input) return;
        const text = input.value.trim();
        if (!text || !activeChat) return;
        
        const message = {
            id: Date.now() + '_' + Math.random().toString(36).substr(2, 8),
            text: text,
            fromId: currentUser.id,
            fromName: currentUser.name,
            timestamp: Date.now(),
            timeStr: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
            type: 'text'
        };
        
        let path = '';
        if (activeChatType === 'user') {
            path = `messages/${getDialogId(currentUser.id, activeChat)}`;
        } else if (activeChatType === 'group') {
            path = `groupMessages/${activeChat}`;
        } else if (activeChatType === 'channel') {
            path = `channelMessages/${activeChat}`;
        }
        
        try {
            await db.ref(path).push(message);
            input.value = '';
            autoResizeTextarea(input);
            scrollToBottom();
        } catch(e) { 
            console.error(e);
            alert('Ошибка отправки'); 
        }
    }
    
    function autoResizeTextarea(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 100) + 'px';
    }
    
    async function attachImage() {
        if (!activeChat) { 
            alert('Сначала выберите чат'); 
            return; 
        }
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (file) {
                const modal = document.createElement('div');
                modal.className = 'profile-modal';
                const previewUrl = URL.createObjectURL(file);
                modal.innerHTML = `
                    <div class="profile-card">
                        <h3>📸 Отправить изображение</h3>
                        <img src="${previewUrl}" style="max-width:100%; max-height:200px; border-radius:12px; margin:12px 0;">
                        <div class="profile-buttons">
                            <button class="btn-primary" id="sendImageBtn">📤 Отправить</button>
                            <button class="btn-close" id="cancelImageBtn">❌ Отмена</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
                
                document.getElementById('sendImageBtn').onclick = async () => {
                    const fileName = `images/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, '_')}`;
                    const storageRef = storage.ref(fileName);
                    await storageRef.put(file);
                    const imageUrl = await storageRef.getDownloadURL();
                    
                    const message = {
                        id: Date.now() + '_' + Math.random().toString(36).substr(2, 8),
                        text: '',
                        imageUrl: imageUrl,
                        fromId: currentUser.id,
                        fromName: currentUser.name,
                        timestamp: Date.now(),
                        timeStr: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                        type: 'image'
                    };
                    
                    let path = '';
                    if (activeChatType === 'user') {
                        path = `messages/${getDialogId(currentUser.id, activeChat)}`;
                    } else if (activeChatType === 'group') {
                        path = `groupMessages/${activeChat}`;
                    } else if (activeChatType === 'channel') {
                        path = `channelMessages/${activeChat}`;
                    }
                    
                    await db.ref(path).push(message);
                    modal.remove();
                    URL.revokeObjectURL(previewUrl);
                    scrollToBottom();
                };
                document.getElementById('cancelImageBtn').onclick = () => {
                    modal.remove();
                    URL.revokeObjectURL(previewUrl);
                };
            }
        };
        input.click();
    }
    
    function loadMessages() {
        if (currentMessagesRef) {
            currentMessagesRef.off();
            currentMessagesRef = null;
        }
        
        if (!activeChat || !activeChatType) return;
        
        let path = '';
        if (activeChatType === 'user') {
            path = `messages/${getDialogId(currentUser.id, activeChat)}`;
        } else if (activeChatType === 'group') {
            path = `groupMessages/${activeChat}`;
        } else if (activeChatType === 'channel') {
            path = `channelMessages/${activeChat}`;
        }
        
        const messagesRef = db.ref(path);
        currentMessagesRef = messagesRef;
        
        messagesRef.on('value', (snapshot) => {
            const messages = [];
            snapshot.forEach(child => {
                messages.push(child.val());
            });
            messages.sort((a, b) => a.timestamp - b.timestamp);
            renderMessages(messages);
            scrollToBottom();
        });
    }
    
    function renderMessages(messages) {
        const container = document.getElementById('messagesContainer');
        if (!container) return;
        
        if (!messages.length) {
            container.innerHTML = '<div class="empty-chat">💬 Напишите первое сообщение</div>';
            return;
        }
        
        let html = '';
        for (const msg of messages) {
            const isOut = msg.fromId === currentUser.id;
            html += `
                <div class="message ${isOut ? 'out' : 'in'}">
                    <div class="message-sender">${escapeHtml(isOut ? 'Вы' : (msg.fromName || 'Пользователь'))}</div>
                    ${msg.type === 'image' && msg.imageUrl ? `<img src="${msg.imageUrl}" class="message-image" onclick="window.open('${msg.imageUrl}', '_blank')">` : `<div>${escapeHtml(msg.text || '')}</div>`}
                    <div class="message-time">${msg.timeStr}</div>
                </div>
            `;
        }
        container.innerHTML = html;
    }
    
    async function loadContactsAndChats() {
        if (!currentUser) return;
        
        // Загрузка личных чатов
        db.ref('messages').on('value', async (snapshot) => {
            const contactsMap = new Map();
            snapshot.forEach(dialog => {
                const parts = dialog.key.split('_');
                if (!parts.includes(currentUser.id)) return;
                const contactId = parts[0] === currentUser.id ? parts[1] : parts[0];
                contactsMap.set(contactId, true);
            });
            
            const newContacts = [];
            for (const [cid] of contactsMap) {
                const name = await getUserName(cid);
                newContacts.push({ id: cid, name: name, type: 'user' });
            }
            contacts = newContacts;
            renderAllChats();
        });
        
        // Загрузка групп
        db.ref(`userGroups/${currentUser.id}`).on('value', async (snapshot) => {
            groups = [];
            const data = snapshot.val() || {};
            for (const groupId of Object.keys(data)) {
                const groupSnap = await db.ref(`groups/${groupId}`).once('value');
                if (groupSnap.exists()) {
                    groups.push({ ...groupSnap.val(), type: 'group' });
                }
            }
            renderAllChats();
        });
        
        // Загрузка каналов
        db.ref(`userChannels/${currentUser.id}`).on('value', async (snapshot) => {
            channels = [];
            const data = snapshot.val() || {};
            for (const channelId of Object.keys(data)) {
                const channelSnap = await db.ref(`channels/${channelId}`).once('value');
                if (channelSnap.exists()) {
                    channels.push({ ...channelSnap.val(), type: 'channel' });
                }
            }
            renderAllChats();
        });
    }
    
    function renderAllChats() {
        const container = document.getElementById('contactsList');
        if (!container) return;
        
        let html = '';
        
        if (currentTab === 'chats') {
            // Личные чаты
            if (contacts.length > 0) {
                html += '<div class="section-title">💬 ЛИЧНЫЕ ЧАТЫ</div>';
                for (const contact of contacts) {
                    const isActive = (activeChat === contact.id && activeChatType === 'user');
                    html += `
                        <div class="chat-item ${isActive ? 'active' : ''}" onclick="selectContact('${contact.id}', 'user')">
                            <div class="chat-avatar">${contact.name.charAt(0).toUpperCase()}</div>
                            <div class="chat-info">
                                <div class="chat-name">${escapeHtml(contact.name)}</div>
                                <div class="view-contact-profile" onclick="event.stopPropagation(); showProfile('${contact.id}', false)">👤 Профиль</div>
                            </div>
                            <div class="call-btns">
                                <button class="call-btn" onclick="event.stopPropagation(); alert('Звонок в разработке')" title="Видеозвонок">📹</button>
                                <button class="call-btn" onclick="event.stopPropagation(); alert('Звонок в разработке')" title="Аудиозвонок">🎤</button>
                                <button class="delete-chat-btn" onclick="event.stopPropagation(); deleteContact('${contact.id}')" title="Удалить">🗑️</button>
                            </div>
                        </div>
                    `;
                }
            }
            
            // Группы
            if (groups.length > 0) {
                html += '<div class="section-title">👥 ГРУППЫ</div>';
                for (const group of groups) {
                    const isActive = (activeChat === group.id && activeChatType === 'group');
                    html += `
                        <div class="chat-item ${isActive ? 'active' : ''}" onclick="selectContact('${group.id}', 'group')">
                            <div class="chat-avatar">👥</div>
                            <div class="chat-info">
                                <div class="chat-name">${escapeHtml(group.name)}</div>
                            </div>
                        </div>
                    `;
                }
            }
            
            // Каналы
            if (channels.length > 0) {
                html += '<div class="section-title">📢 КАНАЛЫ</div>';
                for (const channel of channels) {
                    const isActive = (activeChat === channel.id && activeChatType === 'channel');
                    html += `
                        <div class="chat-item ${isActive ? 'active' : ''}" onclick="selectContact('${channel.id}', 'channel')">
                            <div class="chat-avatar">📢</div>
                            <div class="chat-info">
                                <div class="chat-name">${escapeHtml(channel.name)}</div>
                            </div>
                        </div>
                    `;
                }
            }
            
            if (contacts.length === 0 && groups.length === 0 && channels.length === 0) {
                html = '<div class="empty-contacts">✨ Нет чатов. Начните общение или создайте группу/канал</div>';
            }
        }
        
        container.innerHTML = html;
    }
    
    window.selectContact = async function(chatId, type) {
        if (!chatId) return;
        
        let name = '';
        if (type === 'user') {
            let contact = contacts.find(c => c.id === chatId);
            if (!contact) {
                if (await userExists(chatId)) {
                    contact = { id: chatId, name: await getUserName(chatId), type: 'user' };
                    contacts.push(contact);
                } else { 
                    alert('Пользователь не найден'); 
                    return; 
                }
            }
            name = contact.name;
        } else if (type === 'group') {
            const group = groups.find(g => g.id === chatId);
            if (!group) return;
            name = group.name;
        } else if (type === 'channel') {
            const channel = channels.find(c => c.id === chatId);
            if (!channel) return;
            name = channel.name;
        }
        
        activeChat = chatId;
        activeChatType = type;
        localStorage.setItem('glory_activeChat', JSON.stringify({ id: chatId, type }));
        
        renderAllChats();
        
        const header = document.getElementById('chatHeader');
        if (header) {
            const typeIcon = type === 'user' ? '💬' : type === 'group' ? '👥' : '📢';
            header.innerHTML = `
                <button class="back-to-contacts-btn" id="backToContactsBtn">←</button>
                <div class="chat-info-header">
                    <div class="chat-name-header">
                        ${typeIcon} ${escapeHtml(name)}
                        ${type === 'user' ? `<span class="view-profile-in-chat" onclick="showProfile('${chatId}', false)">👤 Профиль</span>` : ''}
                    </div>
                    <div class="chat-desc">${type === 'user' ? 'Личный чат' : type === 'group' ? 'Группа' : 'Канал'}</div>
                </div>
            `;
            const backBtn = document.getElementById('backToContactsBtn');
            if (backBtn) {
                backBtn.onclick = () => showContacts();
            }
        }
        
        loadMessages();
        showChat();
        
        const input = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const attachBtn = document.getElementById('attachBtn');
        
        if (input) { 
            input.disabled = false; 
            input.placeholder = `Сообщение в ${name}...`; 
            input.focus();
        }
        if (sendBtn) sendBtn.disabled = false;
        if (attachBtn) attachBtn.disabled = false;
    };
    
    async function deleteContact(contactId) {
        if (confirm('Удалить этот контакт?')) {
            contacts = contacts.filter(c => c.id !== contactId);
            if (activeChat === contactId && activeChatType === 'user') {
                activeChat = null;
                activeChatType = null;
                const container = document.getElementById('messagesContainer');
                if (container) container.innerHTML = '<div class="empty-chat">💬 Выберите чат</div>';
                const input = document.getElementById('messageInput');
                const sendBtn = document.getElementById('sendBtn');
                const attachBtn = document.getElementById('attachBtn');
                if (input) input.disabled = true;
                if (sendBtn) sendBtn.disabled = true;
                if (attachBtn) attachBtn.disabled = true;
                showContacts();
            }
            renderAllChats();
        }
    }
    
    async function searchAndAddUser() {
        const input = document.getElementById('searchInput');
        const feedback = document.getElementById('searchFeedback');
        const val = input.value.trim();
        
        if (!val) { 
            feedback.textContent = '❌ Введите ID'; 
            return; 
        }
        if (val === currentUser.id) { 
            feedback.textContent = '❌ Нельзя добавить себя'; 
            return; 
        }
        
        feedback.textContent = '🔍 Поиск...';
        const exists = await userExists(val);
        if (!exists) { 
            feedback.textContent = `❌ Пользователь ${val} не найден`; 
            return; 
        }
        
        const name = await getUserName(val);
        if (!contacts.find(c => c.id === val)) {
            contacts.push({ id: val, name: name, type: 'user' });
        }
        feedback.textContent = `✅ ${name} добавлен!`;
        renderAllChats();
        input.value = '';
        setTimeout(() => {
            if (feedback) feedback.textContent = '';
        }, 2000);
    }
    
    async function createGroup(name, description) {
        const groupId = generateChatId();
        await db.ref(`groups/${groupId}`).set({ 
            id: groupId, 
            name: name, 
            description: description, 
            creator: currentUser.id, 
            members: [currentUser.id] 
        });
        await db.ref(`userGroups/${currentUser.id}/${groupId}`).set(true);
        return groupId;
    }
    
    async function createChannel(name, description) {
        const channelId = generateChatId();
        await db.ref(`channels/${channelId}`).set({ 
            id: channelId, 
            name: name, 
            description: description, 
            creator: currentUser.id, 
            members: [currentUser.id] 
        });
        await db.ref(`userChannels/${currentUser.id}/${channelId}`).set(true);
        return channelId;
    }
    
    async function joinGroup(groupId) {
        const group = await db.ref(`groups/${groupId}`).once('value');
        if (group.exists()) {
            await db.ref(`userGroups/${currentUser.id}/${groupId}`).set(true);
            return true;
        }
        return false;
    }
    
    async function joinChannel(channelId) {
        const channel = await db.ref(`channels/${channelId}`).once('value');
        if (channel.exists()) {
            await db.ref(`userChannels/${currentUser.id}/${channelId}`).set(true);
            return true;
        }
        return false;
    }
    
    function logout() {
        if (currentMessagesRef) {
            currentMessagesRef.off();
        }
        localStorage.clear();
        currentUser = null;
        showLogin();
    }

        });
        
        // Обработчики событий
        document.getElementById('viewMyProfileBtn')?.addEventListener('click', () => showProfile(currentUser.id, true));
        document.getElementById('profileCard')?.addEventListener('click', () => showProfile(currentUser.id, true));
        document.getElementById('exitContactsBtn')?.addEventListener('click', () => {
            window.location.reload();
        });
        document.getElementById('backToContactsBtn')?.addEventListener('click', showContacts);
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
        document.getElementById('sendBtn')?.addEventListener('click', sendMessage);
        document.getElementById('attachBtn')?.addEventListener('click', attachImage);
        
        const input = document.getElementById('messageInput');
        if (input) {
            input.addEventListener('keypress', (e) => { 
                if (e.key === 'Enter' && !e.shiftKey) { 
                    e.preventDefault(); 
                    sendMessage(); 
                } 
            });
            input.addEventListener('input', function() { 
                autoResizeTextarea(this); 
            });
        }
        
        window.setTab = setTab;
        window.setTheme = setTheme;
        window.selectContact = selectContact;
        window.showProfile = showProfile;
        window.changeAvatar = changeAvatar;
        
        loadContactsAndChats();
        setTab('chats');
        showContacts();
        
        const savedChat = localStorage.getItem('glory_activeChat');
        if (savedChat) {
            try {
                const { id, type } = JSON.parse(savedChat);
                setTimeout(() => selectContact(id, type), 500);
            } catch(e) {}
        }
        
        document.querySelectorAll('.theme-option').forEach(opt => {
            if (opt.dataset.theme === savedTheme) opt.classList.add('active');
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    const savedUser = localStorage.getItem('gloryUser');
    if (savedUser && db) {
        try {
            currentUser = JSON.parse(savedUser);
            showMessenger();
        } catch(e) { 
            showLogin(); 
        }
    } else { 
        showLogin(); 
    }
</script>
</body>
</html>
